name: Upstream Sync

# Merges as much of upstream space-wizards/space-station-14 as merges
# cleanly into master, opening (or updating in place) a PR from a fixed
# branch, and stops at the first upstream commit that would conflict.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  UPSTREAM_REPO: space-wizards/space-station-14
  UPSTREAM_BRANCH: master
  SYNC_BRANCH: upstream-sync

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: upstream-sync

jobs:
  sync:
    if: github.repository == 'moff-station/moff-station-14'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4.2.2
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.CHANGELOG_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "${UPSTREAM_BRANCH}"

      - name: Check for new upstream commits
        id: check
        run: |
          count=$(git rev-list --count "master..upstream/${UPSTREAM_BRANCH}")
          echo "Upstream commits not yet on master: $count"
          if [ "$count" -gt 0 ]; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Init submodules
        if: steps.check.outputs.has_new == 'true'
        run: git submodule update --init --recursive

      - name: Setup .NET
        if: steps.check.outputs.has_new == 'true'
        uses: actions/setup-dotnet@v4.1.0
        with:
          dotnet-version: 10.0.x

      - name: Setup Python
        if: steps.check.outputs.has_new == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build map merge driver
        if: steps.check.outputs.has_new == 'true'
        run: dotnet build --configuration Release Content.Tools/Content.Tools.csproj

      - name: Configure map merge driver and bot identity
        if: steps.check.outputs.has_new == 'true'
        run: |
          git config merge.mapping-merge-driver.name "Merge driver for maps"
          git config merge.mapping-merge-driver.driver "Tools/mapping-merge-driver.sh %A %O %B"
          git config user.name "moffbot"
          git config user.email "moffbot@users.noreply.github.com"

      - name: Find clean merge boundary
        id: bisect
        if: steps.check.outputs.has_new == 'true'
        run: python3 Tools/_Moffstation/upstream-sync/find_clean_range.py master "upstream/${UPSTREAM_BRANCH}" | tee -a "$GITHUB_OUTPUT"

      - name: Merge clean range onto sync branch
        if: steps.bisect.outputs.clean_sha != ''
        run: |
          git checkout -B "${SYNC_BRANCH}" master
          git merge --no-edit "${{ steps.bisect.outputs.clean_sha }}"
          git push --force origin "${SYNC_BRANCH}"

      - name: Build PR body
        if: steps.bisect.outputs.clean_sha != ''
        run: python3 Tools/_Moffstation/upstream-sync/build_pr_body.py master "${{ steps.bisect.outputs.clean_sha }}" "${{ steps.bisect.outputs.conflict_sha }}" "${UPSTREAM_REPO}" pr-body.md

      - name: Open or update PR
        if: steps.bisect.outputs.clean_sha != ''
        env:
          GH_TOKEN: ${{ secrets.CHANGELOG_TOKEN }}
        run: |
          title="Upstream sync $(date +'%Y-%m-%d')"
          existing="$(gh pr list --repo "${{ github.repository }}" --head "${SYNC_BRANCH}" --base master --state open --json number --jq '.[0].number')"
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --repo "${{ github.repository }}" --title "$title" --body-file pr-body.md
          else
            gh pr create --repo "${{ github.repository }}" --head "${SYNC_BRANCH}" --base master --title "$title" --body-file pr-body.md
          fi

      - name: Report immediate conflict (no clean commits)
        if: steps.bisect.outputs.clean_sha == '' && steps.bisect.outputs.conflict_sha != ''
        run: |
          subject="$(git log -1 --format='%s' "${{ steps.bisect.outputs.conflict_sha }}")"
          {
            echo "### Upstream sync blocked"
            echo "The very next upstream commit does not merge cleanly: \`${{ steps.bisect.outputs.conflict_sha }}\` ($subject). No PR opened."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report nothing new
        if: steps.check.outputs.has_new == 'false'
        run: echo "No new upstream commits. Nothing to do." >> "$GITHUB_STEP_SUMMARY"
