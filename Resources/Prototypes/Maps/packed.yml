
- type: gameMap
  id: Packed
  mapName: 'Packed'
  mapPath: /Maps/packed.yml
  minPlayers: 7
  maxPlayers: 50 # Moffstation - max player adjustment
  stations:
    Packed:
      stationProto: StandardNanotrasenStation
      components:
      - type: StationNameSetup
        mapNameTemplate: '{0} Packed {1}'
        nameGenerator:
          !type:NanotrasenNameGenerator
          prefixCreator: 'VG'
      - type: StationEmergencyShuttle
        emergencyShuttlePath: /Maps/Shuttles/emergency_crimson.yml
      - type: StationJobs
        availableJobs: # 61 jobs total w/o latejoins, 67 jobs total w/ latejoins
          #command (7)
          Captain: [ 1, 1 ]
          HeadOfPersonnel: [ 1, 1 ]
          HeadOfSecurity: [ 1, 1 ]
          ChiefMedicalOfficer: [ 1, 1 ]
          ChiefEngineer: [ 1, 1 ]
          ResearchDirector: [ 1, 1 ]
          Quartermaster: [ 1, 1 ]
          # Moffstation - Begin - increased job counts for higher pop cap
          #service (11 - 13)
          Bartender: [ 2, 2 ]
          Botanist: [ 2, 3 ]
          Chef: [ 1, 1 ]
          Janitor: [ 1, 2 ]
          Chaplain: [ 1, 1 ]
          Librarian: [ 1, 1 ]
          ServiceWorker: [ 3, 3 ]
          #engineering (8 - 9)
          AtmosphericTechnician: [ 3, 3 ]
          StationEngineer: [ 5, 6 ] #CD - Intern not counted
          # TechnicalAssistant: [ 3, 3 ] #CD - Remove intern roles, rework them into loadouts
          #medical (8 - 9)
          Chemist: [ 2, 2 ]
          MedicalDoctor: [ 5, 6 ] #CD - Intern not counted
          # MedicalIntern: [ 2, 2 ] #CD - Remove intern roles, rework them into loadouts
          Paramedic: [ 1, 1 ]
          #science (5 - 6)
          Scientist: [ 5, 6 ] #CD - Intern not counted
          # ResearchAssistant: [ 2, 2 ] #CD - Remove intern roles, rework them into loadouts
          #security (8 - 9)
          Warden: [ 1, 1 ]
          SecurityOfficer: [ 5, 6 ] #CD - Intern not counted
          Detective: [ 1, 1 ]
          # SecurityCadet: [ 2, 2 ] #CD - Remove intern roles, rework them into loadouts
          Lawyer: [ 1, 1 ]
          #supply (6)
          SalvageSpecialist: [ 2, 2 ]
          CargoTechnician: [ 4, 4 ]
          #civilian (3+)
          Passenger: [ -1, -1 ] #infinite, not counted
          Clown: [ 1, 1 ]
          Mime: [ 1, 1 ]
          Musician: [ 1, 1 ]
          #silicon (4)
          StationAi: [ 1, 1 ]
          Borg: [ 3, 3 ]
          # Moffstation - End
          # Moffstation - custom roles below
          Prisoner: [ 1, 1 ]
