# "Ratty" sofa
# Moffstation - Start - Changed sofas to inherit from SeatBase instead of BenchBaseMiddle
- type: entity
  parent: SeatBase
  #  parent: BenchBaseMiddle
  id: RattySofaMiddle
  name: sofa
  suffix: Middle
  description: Multiple seats spanning a single object. Truly a marvel of science.
  components:
  - type: Transform
    anchored: true
  - type: Rotatable
  - type: Sprite
    sprite: _CD/Structures/Furniture/Sofa/sofa.rsi
    state: middle
  - type: Physics
    bodyType: Static
  - type: Construction
    graph: Sofa
    node: RattySofaMiddle
# Moffstation - End

- type: entity
  id: RattySofaLeft
  suffix: Left # Moffstation
  parent: RattySofaMiddle
  components:
  - type: Sprite
    state: left
  - type: Construction
    graph: Sofa
    node: RattySofaLeft

- type: entity
  id: RattySofaRight
  suffix: Right # Moffstation
  parent: RattySofaMiddle
  components:
  - type: Sprite
    state: right
  - type: Construction
    graph: Sofa
    node: RattySofaRight

