- type: reagent
  id: GrayBlood
  name: reagent-name-gray-blood
  group: Biological
  parent: Radium
  desc: reagent-desc-gray-blood
  physicalDesc: reagent-physical-desc-glowing

- type: reagent
  id: Mucin
  name: reagent-name-mucin
  group: Biological
  desc: reagent-desc-mucin
  flavor: snotty
  color: "#b1d8c1"
  recognizable: true
  physicalDesc: reagent-physical-desc-viscous
  slipData:
    requiredSlipSpeed: 4.0 #It's not as slippery as water
  friction: 0.4
  evaporationSpeed: 15.0
  footstepSound:
    collection: FootstepBlood
    params:
      volume: 6

- type: reagent
  id: BloodAllulalo
  name: reagent-name-bloodallulalo
  group: Biological
  desc: reagent-desc-bloodallulalo
  physicalDesc: reagent-physical-desc-thin
  flavor: allulalo
  color: "#c1c7d3"
  evaporationSpeed: 0.3 #same as water
  metabolisms: #have to redefine from basealcohol otherwise its slippery which is a hell of a can of worms for a species
    Metabolites:
      metabolismRate: 0.05
      effects:
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Ethanol
          min: 15
        - !type:MetabolizerTypeCondition
          type: [ Dwarf ]
          inverted: true
        damage:
          types:
            Poison: 0.1
      # dwarves take less toxin damage and heal a marginal amount of brute
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Ethanol
          min: 15
        - !type:MetabolizerTypeCondition
          type: [ Dwarf ]
        damage:
          types:
            Poison: 0.02
      - !type:EvenHealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Ethanol
          min: 15
        - !type:MetabolizerTypeCondition
          type: [ Dwarf ]
        damage:
          Brute: -0.1
      - !type:Vomit
        probability: 0.04
        conditions:
        - !type:ReagentCondition
          reagent: Ethanol
          min: 12
        # dwarves immune to vomiting from alcohol
        - !type:MetabolizerTypeCondition
          type: [ Dwarf ]
          inverted: true
      - !type:Drunk
        boozePower: 2

- type: reagent # can't parent it to blood because anybody should be able to drink it, the flesh/organs are the toxic parts (fugu moment)
  id: ShimmeringBlood
  name: reagent-name-shimmering-blood
  group: Biological
  desc: reagent-desc-shimmering-blood
  flavor: shimmeringblood
  color: "#ff624a" # a slightly warmer color than the ichor extracted from dragon flesh
  recognizable: true
  physicalDesc: reagent-physical-desc-shimmering-blood
  metabolisms:
    Digestion:
      effects:
      - !type:SatiateHunger
        factor: 1
      - !type:SatiateThirst
        factor: 1
    Bloodstream:
      effects:
      - !type:ModifyStatusEffect
        effectProto: StatusEffectSeeingRainbow
        type: Add
        time: 5
  plantMetabolism:
    - !type:PlantAdjustToxins
      amount: 2
    - !type:PlantAdjustWeeds
      amount: -2
    - !type:PlantAdjustPests
      amount: -2
  footstepSound:
    collection: FootstepBlood
    params:
      volume: 6
