- type: constructionGraph
  id: APC
  start: start
  graph:
    - node: start
      edges:
        - to: apcFrame
          steps:
            - material: Steel
              amount: 3
              doAfter: 2

    - node: apcFrame
      entity: APCFrame
      edges:
        - to: apcFrameWithBoard # Moffstation - Modular APCs
          steps:
            - component: ApcElectronics
              name: construction-graph-component-apc-electronics
              icon:
                sprite: "Objects/Misc/module.rsi"
                state: "charger_APC"
              doAfter: 2
        - to: start
          completed:
            - !type:GivePrototype
              prototype: SheetSteel1
              amount: 3
            - !type:DeleteEntity {}
          steps:
            - tool: Screwing
              doAfter: 2

    - node: apc
      entity: APCBasic # Moffstation - Modular APCs
      edges:
        - to: apcFrameWithBoard # Moffstation - Modular APCs
          completed:
            - !type:GivePrototype
              prototype: PowerCellMediumPrinted # Moffstation - Modular APCs
              amount: 1
          conditions:
            - !type:WirePanel
              open: true
          steps:
            - tool: Prying
              doAfter: 4
