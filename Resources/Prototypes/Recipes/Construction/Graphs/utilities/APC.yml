- type: constructionGraph
  id: APC
  start: start
  graph:
    - node: start
      edges:
        - to: apcFrame
          steps:
            - material: Steel
              amount: 3
              doAfter: 2

    - node: apcFrame
      entity: APCFrame
      edges:
        - to: apcFrameWithBoard
          steps:
            - component: ApcElectronics
              name: construction-graph-component-apc-electronics
              icon:
                sprite: "Objects/Misc/module.rsi"
                state: "charger_APC"
              doAfter: 2
        - to: start
          completed:
            - !type:GivePrototype
              prototype: SheetSteel1
              amount: 3
            - !type:DeleteEntity {}
          steps:
            - tool: Screwing
              doAfter: 2

    - node: apcFrameWithBoard
      entity: APCFrameWithBoard
      edges:
        - to: apcPotato
          steps:
          - anyTags:
            - PotatoBattery
            store: powercell
            name: construction-graph-tag-power-cell
            icon:
              sprite: "Objects/Power/power_cells.rsi"
              state: "small"
            doAfter: 0.5
          - tool: Screwing
            doAfter: 2
        - to: apcSmall
          steps:
          - anyTags:
            - PowerCellSmall
            store: powercell
            name: construction-graph-tag-power-cell
            icon:
              sprite: "Objects/Power/power_cells.rsi"
              state: "small"
            doAfter: 0.5
          - tool: Screwing
            doAfter: 2
        - to: apc
          steps:
          - anyTags:
            - PowerCellMedium
            store: powercell
            name: construction-graph-tag-power-cell
            icon:
              sprite: "Objects/Power/power_cells.rsi"
              state: "medium"
            doAfter: 0.5
          - tool: Screwing
            doAfter: 2
        - to: apcHigh
          steps:
          - anyTags:
            - PowerCellHigh
            store: powercell
            name: construction-graph-tag-power-cell
            icon:
              sprite: "Objects/Power/power_cells.rsi"
              state: "medium"
            doAfter: 0.5
          - tool: Screwing
            doAfter: 2
        - to: apcHyper
          steps:
          - anyTags:
            - PowerCellHyper
            store: powercell
            name: construction-graph-tag-power-cell
            icon:
              sprite: "Objects/Power/power_cells.rsi"
              state: "medium"
            doAfter: 0.5
          - tool: Screwing
            doAfter: 2
        - to: apcFrame
          completed:
          - !type:GivePrototype
            prototype: APCElectronics
            amount: 1
          conditions:
          - !type:WirePanel
            open: true
          steps:
          - tool: Prying
            doAfter: 4


    - node: apc
      entity: APCBasic
      edges:
        - to: apcFrameWithBoard
          completed:
            - !type:GivePrototype
              prototype: PowerCellMediumPrinted # Empty
              amount: 1
          conditions:
            - !type:WirePanel
              open: true
          steps:
            - tool: Prying
              doAfter: 4

    - node: apcSmall
      entity: APCSmallCapacity
      edges:
      - to: apcFrameWithBoard
        completed:
        - !type:GivePrototype
          prototype: PowerCellSmallPrinted # Empty
          amount: 1
        conditions:
        - !type:WirePanel
          open: true
        steps:
        - tool: Prying
          doAfter: 4

    - node: apcHigh
      entity: APCHighCapacity
      edges:
      - to: apcFrameWithBoard
        completed:
        - !type:GivePrototype
          prototype: PowerCellHighPrinted # Empty
          amount: 1
        conditions:
        - !type:WirePanel
          open: true
        steps:
        - tool: Prying
          doAfter: 4

    - node: apcHyper
      entity: APCHyperCapacity
      edges:
      - to: apcFrameWithBoard
        completed:
        - !type:GivePrototype
          prototype: PowerCellHyperPrinted # Empty
          amount: 1
        conditions:
        - !type:WirePanel
          open: true
        steps:
        - tool: Prying
          doAfter: 4

    - node: apcPotato
      entity: APCPotatoCapacity
      edges:
      - to: apcFrameWithBoard
        completed:
        - !type:GivePrototype
          prototype: PowerCellPotato
          amount: 1
        conditions:
        - !type:WirePanel
          open: true
        steps:
        - tool: Prying
          doAfter: 4
