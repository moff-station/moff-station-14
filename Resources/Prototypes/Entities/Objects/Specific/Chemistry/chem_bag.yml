- type: entity
  name: chemistry bag
  id: ChemBag
  parent: BaseStorageItem
  description: A bag for storing chemistry products, such as jugs, beakers, pills, pill canisters, vials, and syringes. # Moffstation - Fitting jugs and vials instead of bottles
  components:
  - type: Sprite
    sprite: _Moffstation/Clothing/Belt/chemistry.rsi # Moffstation - Davyei's Sprite
    state: icon
  - type: Clothing
    sprite: _Moffstation/Clothing/Belt/chemistry.rsi # Moffstation - Davyei's Sprite
    quickEquip: false
    slots:
    - belt
  - type: Item
    size: Ginormous
  # Moffstation - Start - MedbayBelt Rework
  - type: Storage
    maxItemSize: Normal 
    grid:
      - 0,0,6,1
      - 7,0,7,0
#    Upstream functionality rewritten
#    quickInsert: true
#    areaInsert: true
    whitelist:
      components:
        - FitsInDispenser
        - Pill
      tags:
        - Jug
        - Document
        - PillCanister
        - CentrifugeCompatible # Existing Vial only tag
        - Syringe
        - Dropper
  - type: Dumpable
  - type: QuickPickup
  - type: AreaPickup
  # Moffstation - End
