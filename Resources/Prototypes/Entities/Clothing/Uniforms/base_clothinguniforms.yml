- type: entity
  abstract: true
  parent: [SolutionFood, SolutionToolNormal, Clothing, BaseSlicingRefinable]
  id: UnsensoredClothingUniformBase
  components:
  - type: Sprite
    state: icon
  - type: Clothing
    slots: [innerclothing]
    equipSound:
      path: /Audio/Items/jumpsuit_equip.ogg
  - type: ToolRefinable
    refineResult:
    - id: MaterialCloth1
      amount: 3
  - type: PhysicalComposition # 50% of the amount of cloth you'd obtain upon butchering
    materialComposition:
      Cloth: 150
  - type: Edible
    requiresSpecialDigestion: true
  - type: Solution
    solution:
      reagents:
      - ReagentId: Fiber
        Quantity: 30
      # Forky - start - clothing stains
      stain:
        maxVol: 5
      # Forky - end
  - type: Tag
    tags:
    - ClothMade
    - Recyclable
    - WhitelistChameleon
  # Forky - start - clothing stains
  - type: Appearance
  - type: Stainable
    clothingVisuals:
      jumpsuit:
      - sprite: _Funkystation/Effects/blood.rsi
        state: uniformblood
    itemVisuals:
      left:
      - sprite: Effects/Stains/jumpsuit.rsi
        state: inhand-right
      right:
      - sprite: Effects/Stains/jumpsuit.rsi
        state: inhand-left
    iconVisuals:
    - sprite: _Funkystation/Effects/blood.rsi
      state: uniformbloodicon
    # Forky - end

- type: entity
  abstract: true
  parent: UnsensoredClothingUniformBase
  id: UnsensoredClothingUniformSkirtBase
  components:
  - type: Clothing
    slots: [innerclothing]
    femaleMask: UniformTop
  # Forky - start - clothing stains
  - type: Stainable
    clothingVisuals:
      jumpsuit:
      - sprite: _Funkystation/Effects/blood.rsi
        state: uniformblood
    itemVisuals:
      left:
      - sprite: Effects/Stains/jumpskirt.rsi
        state: inhand-right
      right:
      - sprite: Effects/Stains/jumppskirt.rsi
        state: inhand-left
    iconVisuals:
    - sprite: _Funkystation/Effects/blood.rsi
      state: uniformbloodicon
    # Forky - end


- type: entity
  abstract: true
  parent: UnsensoredClothingUniformBase
  id: ClothingUniformBase
  components:
  - type: SuitSensor
  - type: DeviceNetwork
    deviceNetId: Wireless
    transmitFrequencyId: SuitSensor
    savableAddress: false
  - type: WirelessNetworkConnection
    range: 1200
  - type: StationLimitedNetwork

