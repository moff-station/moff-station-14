# White Jumpsuit
- type: entity
  parent: ClothingUniformBase
  id: ClothingUniformJumpsuitColorWhite
  name: white jumpsuit
  description: A generic white jumpsuit with no rank markings.
  components:
  - type: Sprite
    sprite: _Moffstation/Clothing/Uniforms/Jumpsuit/jumpsuit.rsi # Moffstation
    layers:
    - state: icon-light
    - state: basics-trinkets-icon # Moffstation
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
      #- state: trinkets-inhand-left #Moffstation
      right:
      - state: inhand-right
      #- state: trinkets-inhand-right # Moffstation
  - type: Clothing
    sprite: _Moffstation/Clothing/Uniforms/Jumpsuit/jumpsuit.rsi # Moffstation
    clothingVisuals:
      jumpsuit:
      - state: equipped-INNERCLOTHING-light
      - state: basics-trinkets-equipped-INNERCLOTHING # Moffstation

