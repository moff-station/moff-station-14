# White Jumpskirt
- type: entity
  parent: ClothingUniformSkirtBase
  id: ClothingUniformJumpskirtColorWhite
  name: white jumpskirt
  description: A generic white jumpskirt with no rank markings.
  components:
  - type: Sprite
    sprite: _Moffstation/Clothing/Uniforms/Jumpskirt/jumpskirt.rsi # Moffstation
    layers:
    - state: icon
    - state: basics-trinkets-icon # Moffstation
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
      #- state: trinkets-inhand-left #Moffstation
      right:
      - state: inhand-right
      #- state: trinkets-inhand-right # Moffstation
  - type: Clothing
    sprite: _Moffstation/Clothing/Uniforms/Jumpskirt/jumpskirt.rsi # Moffstation
    clothingVisuals:
      jumpsuit:
      - state: equipped-INNERCLOTHING
      - state: basics-trinkets-equipped-INNERCLOTHING # Moffstation

