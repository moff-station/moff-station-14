- type: entity
  abstract: true
  parent: [SolutionFood, SolutionToolNormal, Clothing]
  id: ClothingShoesBase
  components:
  - type: Clothing
    slots:
    - FEET
  - type: Sprite
    state: icon
  - type: Item
    size: Normal
  - type: Edible
    requiresSpecialDigestion: true
  - type: Solution
    solution:
      reagents:
      - ReagentId: Fiber
        Quantity: 30
      # Forky - start - clothing stains
      stain:
        maxVol: 5
      # Forky - end
  - type: Tag
    tags:
    - ClothMade
    - Recyclable
    - WhitelistChameleon
  - type: ProtectedFromStepTriggers
  # Forky - start - clothing stains
  - type: Appearance
  - type: Stainable
    clothingVisuals:
      shoes:
      - sprite: _Funkystation/Effects/blood.rsi
        state: shoeblood
    iconVisuals:
    - sprite: _Funkystation/Effects/blood.rsi
      state: shoebloodicon
    # Forky - end

- type: entity
  abstract: true
  parent: [ClothingShoesBase, BaseSlicingRefinable]
  id: ClothingShoesBaseButcherable
  components:
  - type: ToolRefinable
    refineResult:
    - id: MaterialCloth1
      amount: 1
  - type: PhysicalComposition # 50% of the amount of cloth you'd obtain upon butchering
    materialComposition:
      Cloth: 50

# stuff common to all military boots
- type: entity
  abstract: true
  parent: [ClothingShoesBase, ClothingSlotBase]
  id: ClothingShoesMilitaryBase
  components:
  - type: Matchbox
  - type: ItemSlots
    slots:
      item:
        name: clothing-boots-sidearm
        priority: 4
        whitelist:
          tags:
          - Knife
          - Sidearm

- type: entity
  abstract: true
  id: ClothingShoesBootsSecFilled
  suffix: Filled
  components:
  - type: ContainerFill
    containers:
      item:
      - CombatKnife

- type: entity
  abstract: true
  parent: ClothingShoesBaseButcherable
  id: ClothingShoesBaseWinterBoots
  description: Fluffy boots to help survive even the coldest of winters.
  components:
  - type: TemperatureProtection
    heatingCoefficient: 1.025
    coolingCoefficient: 0.5
