- type: entity
  parent: [ ClothingHeadBase, BaseToggleClothing ]
  id: WeldingMaskBase
  name: welding mask
  abstract: true
  components:
  - type: Item
    storedRotation: 0
  - type: PhysicalComposition
    materialComposition:
      Steel: 200
      Glass: 100
  - type: StaticPrice
    price: 50
  - type: Tag
    tags:
    - WhitelistChameleon
    - WeldingMask
  # Funky
  - type: ToggleClothing
    action: ActionToggleWeldingMask
    mustEquip: false
  - type: ItemToggle
    activated: true
  - type: ComponentToggler
    components:
    - type: IngestionBlocker
    - type: FlashImmunity
    - type: IdentityBlocker
    - type: EyeProtection
    - type: WeldingMaskOverlay
      texture: /Textures/_Funkystation/Clothing/Head/Welding/weldingOverlay.png
  - type: ItemTogglePrefix
    prefixOn: null
    prefixOff: up
  - type: ToggleClothingPrefix
    prefixOn: null
    prefixOff: up
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: icon}
          False: {state: icon-up}

- type: entity
  parent: WeldingMaskBase
  id: ClothingHeadHatWelding
  name: welding mask
  description: A head-mounted face cover designed to protect the wearer completely from space-arc eye.
  components:
  - type: Sprite
    sprite: Clothing/Head/Welding/welding.rsi
    layers: # Funky
    - state: icon
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: Clothing
    sprite: Clothing/Head/Welding/welding.rsi
  - type: Tag
    tags:
    - HamsterWearable
    - WhitelistChameleon
    - WeldingMask

- type: entity
  parent: WeldingMaskBase
  id: ClothingHeadHatWeldingMaskFlame
  name: flame welding mask
  description: A painted welding helmet, this one has flames on it.
  components:
  - type: Sprite
    sprite: Clothing/Head/Welding/flame_welding_mask.rsi
    layers: # Funky
    - state: icon
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: Clothing
    sprite: Clothing/Head/Welding/flame_welding_mask.rsi

- type: entity
  parent: WeldingMaskBase
  id: ClothingHeadHatWeldingMaskFlameBlue
  name: blue-flame welding mask
  description: A painted welding helmet, this one has blue flames on it.
  components:
  - type: Sprite
    sprite: Clothing/Head/Welding/blue_flame_welding_mask.rsi
    layers: # Funky
    - state: icon
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: Clothing
    sprite: Clothing/Head/Welding/blue_flame_welding_mask.rsi

- type: entity
  parent: WeldingMaskBase
  id: ClothingHeadHatWeldingMaskPainted
  name: painted welding mask
  description: A welding helmet, painted in crimson.
  components:
  - type: Sprite
    sprite: Clothing/Head/Welding/paintedwelding.rsi
    layers: # Funky
    - state: icon
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: Clothing
    sprite: Clothing/Head/Welding/paintedwelding.rsi

# Funky
- type: entity
  parent: BaseAction
  id: ActionToggleWeldingMask
  name: Toggle Welding Mask
  description: Flips the welding mask up or down.
  components:
  - type: Action
    itemIconStyle: BigItem
  - type: InstantAction
    event: !type:ToggleActionEvent
