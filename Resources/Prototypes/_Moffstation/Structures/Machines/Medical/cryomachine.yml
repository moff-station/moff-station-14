- type: entity
  parent: BaseMachine
  id: CLSMachine
  name: cryogenic life support
  description: A machine able to keep organs alive in absence of a body.
  placement:
    mode: SnapgridCenter
  components:
  - type: CryoLifeSupport
    # todo : each entry is associated to a name.
    monitoredOrgans:
    - Brain
    - Eyes
    - Lungs
    - Heart
    - Stomach
    monitoredOrganNames:
    - Brain
    - Eyes
    - Lungs
    - Heart
    - Stomach
    capsuleSlot:
      name: cryomachine-capsule-slot-name
      whitelist:
        components:
        - FitInCryoLifeSupport
    beakerSlot:
      name: cryomachine-beaker-slot-name
      whitelist:
        components:
        - FitsInDispenser
  - type: Sprite
    granularLayersRendering: true
    sprite: _Moffstation/Structures/Machines/cryo_capsule.rsi
    drawdepth: Mobs
    noRot: true
    layers:
    - sprite: Structures/Piping/Atmospherics/pipe.rsi
      state: pipeHalf
      drawdepth: ThinPipe
      map: [ "enum.PipeVisualLayers.Pipe" ]
    - state: machine-empty
      map: [ "enum.CryoPodVisualLayers.Base" ]
      renderingStrategy: Default
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.CryoLifeSupportVisuals.Filled:
        base:
          False: { state: machine-empty }
          True: { state: machine-working }
  - type: AmbientSound
    volume: -9
    range: 5
    enabled: false
    sound:
      path: /Audio/Machines/spinning.ogg
  - type: PointLight
    radius: 1.5
    energy: 5.0
    castShadows: false
    color: "#56c3b9"
  - type: ItemSlots
  - type: ContainerContainer
    containers:
      capsule_slot: !type:ContainerSlot
  - type: UserInterface
    interfaces:
      enum.CryoLifeSupportUiKey.Key:
        type: CryoLifeSupportBoundUserInterface
  - type: ActivatableUI
    key: enum.CryoLifeSupportUiKey.Key
    requiresComplex: false
  - type: ApcPowerReceiver
    powerLoad: 3000
  - type: AtmosDevice
  - type: CryoPodAir
  - type: NodeContainer
    nodes:
        port:
          !type:PortablePipeNode
          nodeGroupID: Pipe
          pipeDirection: South

