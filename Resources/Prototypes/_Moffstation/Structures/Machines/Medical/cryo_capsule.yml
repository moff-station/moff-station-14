- type: entity
  parent: BaseStructure
  id: CryoCapsule
  name: cryo capsule
  description: A machine able to keep organs alive in absence of a body.
  components:
  - type: Cryocapsule
    casketSlot:
      name: casket_slot
      whitelist:
        components:
        - CryoCasket
  - type: Sprite
    sprite: _Moffstation/Structures/Machines/cryo_capsule.rsi
    state: machine-working
    noRot: true
  - type: AmbientSound
    volume: -9
    range: 5
    enabled: true
    sound:
      path: /Audio/Machines/spinning.ogg
  - type: PointLight
    radius: 1.5
    energy: 5.0
    castShadows: false
    color: "#56c3b9"
  - type: ItemSlots
  - type: ContainerContainer
    containers:
      brain_slot: !type:ContainerSlot
  - type: ApcPowerReceiver
    powerLoad: 3000

