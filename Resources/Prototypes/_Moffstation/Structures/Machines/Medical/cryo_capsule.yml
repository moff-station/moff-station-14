- type: entity
  parent: BaseStructure
  id: CryoCapsule
  name: cryo capsule
  description: A machine able to keep organs alive in absence of a body.
  components:
  - type: Cryocapsule
    brainSlot:
      name: brain_slot
      whitelist:
        components:
        - Brain
  - type: Sprite
    sprite: _Moffstation/Structures/Machines/cryo_capsule.rsi
    state: machine-working
    noRot: true
  - type: AmbientSound
    volume: -9
    range: 5
    enabled: true
    sound:
      path: /Audio/Machines/spinning.ogg
  - type: ItemSlots
  - type: ContainerContainer
    containers:
      brain_slot: !type:ContainerSlot
  - type: Speech
    speechSounds: Pai

