- type: gameMap
  id: Frezon
  mapName: 'Frezon'
  mapPath: /Maps/_Moffstation/frezon.yml
  minPlayers: 11 # Ultra-Low Pop
  maxPlayers: 35 # Ultra-Low Pop
  stations:
    Frezon:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Frezon Relay {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/Shuttles/emergency.yml
        - type: StationJobs
          availableJobs: # 31 jobs total w/o latejoins, 40 jobs total w/ latejoins
            #command (7)
            Captain: [ 1, 1 ]
            HeadOfPersonnel: [ 1, 1 ]
            HeadOfSecurity: [ 1, 1 ]
            ChiefMedicalOfficer: [ 1, 1 ]
            ChiefEngineer: [ 1, 1 ]
            ResearchDirector: [ 1, 1 ]
            Quartermaster: [ 1, 1 ]
            #service (8 - 9)
            Bartender: [ 1, 1 ]
            Botanist: [ 1, 1 ]
            Chef: [ 1, 1 ]
            Janitor: [ 1, 1 ]
            Chaplain: [ 1, 1 ]
            Librarian: [ 1, 1 ]
            ServiceWorker: [ 1, 2 ]
            Reporter: [ 1, 1 ]
            #engineering (2 - 3)
            AtmosphericTechnician: [ 1, 1 ]
            StationEngineer: [ 1, 2 ]
            #medical (4 - 5)
            Chemist: [ 1, 1 ]
            MedicalDoctor: [ 2, 3 ]
            Paramedic: [ 1, 1 ]
            #science (1 - 2)
            Scientist: [ 1, 2 ]
            #security (3 - 5)
            Warden: [ 1, 1 ]
            SecurityOfficer: [ 1, 3 ]
            Detective: [ 1, 1 ]
            #supply (3 - 4)
            CargoTechnician: [ 1, 2 ]
            SalvageSpecialist: [ 2, 2 ]
            #civilian (3+)
