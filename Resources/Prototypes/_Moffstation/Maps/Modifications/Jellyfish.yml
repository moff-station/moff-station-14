- type: mapModification
  id: JellyfishModificationsLaundry
  applyOn:
  - Jellyfish
  removals:
  - !type:EntityPrototypeSelector
    prototype: FloorDrain
    bounds: "45, -43, 46, -45"
  additions:
    # Jellyfish is small, it can just have a Washing Machine
  - prototype: WashingMachine
    position: 45.5, -43.5
  - prototype: FloorDrain
    position: 45.5, -44.5
  - prototype: SignLaundromat
    position: 43.5, -42.5
  - prototype: DefaultStationBeaconLaundromat
    position: 46.5, -44.5
