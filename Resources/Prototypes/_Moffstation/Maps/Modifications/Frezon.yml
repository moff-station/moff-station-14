- type: mapModification
  id: FrezonModificationsLaundry
  applyOn:
  - Frezon
  removals:
  - !type:EntityPrototypeSelector
    prototype: Mirror
    bounds: "2,-15,4,-14"
  - !type:EntityPrototypeSelector
    prototype: Sink
    bounds: "2,-15,4,-14"
  additions:
    # Frezon is small, it can just have a Washing Machine
  - prototype: WashingMachine
    position: 3.5, -14.5