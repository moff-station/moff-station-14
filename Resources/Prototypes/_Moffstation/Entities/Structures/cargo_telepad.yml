- type: entity
  parent: CargoTelepad
  id: CargoTelepadSyndicate
  name: unstable telepad
  description: Reverse engineered from Nanotrasen design, powered by the crackling energies of redspace.
  components:
  - type: Sprite
    sprite: _Moffstation/Structures/Machines/syndicate_telepad.rsi
    drawdepth: HighFloorObjects
    layers:
    - state: offline
      map: [ "enum.CargoTelepadLayers.Base" ]
    - state: idle
      map: [ "enum.CargoTelepadLayers.Beam" ]
      shader: unshaded
  - type: CargoTelepad
    printerOutput: PaperCargoInvoiceSyndicate
    telepadFlash: AdminInstantEffectRedspace
  - type: AnimationPlayer
  - type: AccessReader
    access: [["NuclearOperative"]]
  - type: PointLight
    color: "#c03334"
