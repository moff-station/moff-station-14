- type: entity
  parent: GasMixer
  id: GasMolarMixer
  name: molar gas mixer
  description: Very useful for mixing gases.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Moffstation/Structures/Piping/Atmospherics/gas_molar_mixer.rsi
    layers:
    - sprite: Structures/Piping/Atmospherics/pipe.rsi
      state: pipeTrinaryConnectors
      map: [ "enum.PipeVisualLayers.Pipe" ]
    - state: gasMixer
      map: [ "enum.SubfloorLayers.FirstLayer", "enabled" ]
  - type: GasMixerMolar
    enabled: false
    inletOne: inlet
    inletTwo: filter
  - type: Flippable
    mirrorEntity: GasMolarMixerFlipped
  - type: Construction
    graph: GasTrinary
    node: molarmixer

- type: entity
  parent: GasMixerFlipped
  id: GasMolarMixerFlipped
  name: molar gas mixer
  suffix: Flipped
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Moffstation/Structures/Piping/Atmospherics/gas_molar_mixer.rsi
    layers:
    - sprite: Structures/Piping/Atmospherics/pipe.rsi
      state: pipeTrinaryConnectors
      map: [ "enum.PipeVisualLayers.Pipe" ]
    - state: gasMixerF
      map: [ "enum.SubfloorLayers.FirstLayer", "enabled" ]
  - type: Appearance
  - type: Flippable
    mirrorEntity: GasMolarMixer
  - type: Construction
    node: molarmixerflipped
