- type: entity
  parent: [ MobSiliconBase, MobCombat ]
  id: MobHugBot
  name: hugbot
  description: Awww, who needs a hug?
  components:
  - type: Sprite
    sprite: _Moffstation/Mobs/Silicon/Bots/hugbot.rsi
    state: hugbot
  - type: Construction
    graph: HugBot
    node: bot
  - type: MovementSpeedModifier
    baseWalkSpeed: 2
    baseSprintSpeed: 3
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/boxingpunch1.ogg
    angle: 30
    animation: WeaponArcPunch
    damage:
      types:
        Blunt: 2
  - type: Anchorable
  - type: Hands # This probably REALLY needs hand whitelisting, but we NEED hands for hugs, so...
  - type: ComplexInteraction # Hugging is a complex interaction, apparently.
  - type: HugBot
  - type: Body
    prototype: HugBot
  - type: HTN
    rootTask:
      task: HugBotCompound
  - type: InteractionPopup
    interactSuccessString: hugging-success-generic
    interactSuccessSound: /Audio/Effects/thudswoosh.ogg
    messagePerceivedByOthers: hugging-success-generic-others
