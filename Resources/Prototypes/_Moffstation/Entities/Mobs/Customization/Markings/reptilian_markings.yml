- type: marking
  id: ReptilianDragonEye
  bodyPart: Eyes
  groupWhitelist: [ Reptilian ]
  coloring:
    layers:
      tattoo_eye_dragon_shadow:
        type: !type:SkinColoring
      tattoo_eye_dragon_color:
        type: !type:EyeColoring
  sprites:
  - sprite: _Moffstation/Mobs/Customization/Reptilian/dragon_eye.rsi
    state: tattoo_eye_dragon_shadow
  - sprite: _Moffstation/Mobs/Customization/Reptilian/dragon_eye.rsi
    state: tattoo_eye_dragon_color

