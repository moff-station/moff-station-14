- type: entity
  parent: ClothingHeadHatHoodRad
  id: ClothingHeadHatHoodSovietRad
  name: soviet radiation hood
  description: A primitive hooded gas mask covering the wearer's head in thick rubber. It's too bulky to be worn beneath a helmet but still issued to penal crews and frontier scavengers. Officials claim that it's able to withstand lethal radiation for forty seconds.
  components:
  - type: Sprite
    sprite: _Moffstation/Clothing/Head/Hoods/sovietradhood.rsi
  - type: Clothing
    sprite: _Moffstation/Clothing/Head/Hoods/sovietradhood.rsi
  - type: ZombificationResistance
    zombificationResistanceCoefficient: 0.95
  - type: Armor
    modifiers:
      coefficients:
        Radiation: 0.80
