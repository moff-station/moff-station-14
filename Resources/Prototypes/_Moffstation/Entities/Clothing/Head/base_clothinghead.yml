- type: entity
  abstract: true
  id: ClothingHeadToggleableWeldingMask
  name: base helmet toggleable welding mask
  categories: [ HideSpawnMenu ]
  components:
  - type: HelmetVisor
    isActive: true
    components:
    - type: EyeProtection
    - type: FlashImmunity
    - type: WeldingMaskOverlay
      texture: /Textures/_Funkystation/Clothing/Head/Welding/weldingOverlay.png
  - type: GenericVisualizer
    visuals:
      enum.HelmetVisorVisuals.IsDown:
        visor_icon:
          False: { visible: false }
          True: { visible: true, state: icon-up }
        unshaded_base:
          False: { visible: true }
          True: { visible: false }

- type: entity
  parent: BaseAction
  id: ActionToggleHelmetVisor
  name: Toggle Visor
  description: Flips the helmet visor up or down.
  components:
  - type: Action
    icon:
      sprite: Clothing/Head/Welding/welding.rsi
      state: icon
  - type: InstantAction
    event: !type:ToggleHelmetVisorEvent
