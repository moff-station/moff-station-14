# Modular HUD eyewear
## Modular HUD base abstract for parenting
- type: entity
  parent: ClothingEyesHudBase
  id: ClothingEyesModularHudBase
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: icon-lens
      map: [ "enum.ModularHudVisualKeys.Lens" ]
    - state: icon-specular
      map: [ "enum.ModularHudVisualKeys.Specular" ]
    - state: icon-lens-accent-minor
      map: [ "enum.ModularHudVisualKeys.LensAccentMinor" ]
    - state: icon-lens-accent-major
      map: [ "enum.ModularHudVisualKeys.LensAccentMajor" ]
    - state: icon-frame
      map: [ "enum.ModularHudVisualKeys.Frame" ]
    - state: icon-accent
      map: [ "enum.ModularHudVisualKeys.Accent" ]
  - type: Item
    inhandVisuals:
      Left:
      - state: inhand-left-frame
      Right:
      - state: inhand-right-frame
  - type: Clothing
    clothingVisuals:
      eyes:
      - state: equipped-EYES-frame
  - type: Appearance
  - type: ModularHudVisuals
    defaultVisuals:
      Accent: Black
      Lens: LightSteelBlue
      Specular: White
    layerMap:
      Accent: accent
      Lens: lens
      Specular: specular
      LensAccentMinor: lens-accent-minor
      LensAccentMajor: lens-accent-major
      Frame: frame
  - type: ModularHud
    moduleContainerId: modular-hud-modules
    maximumContainedModules: 2
    moduleExtractionToolQuality: Screwing
    moduleRemovalDelay: 1s
  - type: ContainerContainer
    containers:
      modular-hud-modules: !type:Container

## Empty Modular HUD frames
- type: entity
  parent: ClothingEyesModularHudBase
  id: ClothingEyesModularHudPatch
  name: modular HUD eye patch
  description: The true patriot's choice for a heads-up display! Though, if there's no eye underneath, how do you see what it's showing?
  components:
  - type: Sprite
    sprite: _Moffstation/Clothing/Eyes/Hud/patch.rsi
  - type: Clothing
    sprite: _Moffstation/Clothing/Eyes/Hud/patch.rsi
    clothingVisuals: {} # Remove default frame layer because we need to be able to flip it dynamically.
  - type: ModularHudVisuals
    frameIsDynamic: true # Need to dynamically flip the frame as well as everything else.
    foldedLayerSuffix: "-flipped"
    speciesWithDifferentClothing:
    - secdog
    - moth
    - resomi
    inhandExcludedLayers:
      default: # No inhand sprites for patches yet
      - Accent
      - LensAccentMajor
      - LensAccentMinor
      - Lens
      - Specular
  - type: Foldable
    canFoldInsideContainer: true
    unfoldVerbText: fold-flip-verb
    foldVerbText: fold-flip-verb

- type: entity
  parent: ClothingEyesModularHudBase
  id: ClothingEyesModularHudGlasses
  name: modular HUD glasses
  description: Truly a marvel of Nanotrasen engineering, these slim glasses have an integrated heads-up display in spite of their small size.
  components:
  - type: Sprite
    sprite: _Moffstation/Clothing/Eyes/Hud/glasses.rsi
  - type: Item
    sprite: _Moffstation/Clothing/Eyes/Hud/glasses.rsi
  - type: Clothing
    sprite: _Moffstation/Clothing/Eyes/Hud/glasses.rsi
  - type: ModularHudVisuals
    speciesWithDifferentClothing:
    - arachnid
    - dog
    - moth
    - secdog
    inhandExcludedLayers:
      default:
      - Accent
  - type: Tag
    tags:
    - FullEyeCovering

- type: entity
  parent: ClothingEyesModularHudBase
  id: ClothingEyesModularHudJamjars
  name: modular HUD jam jar glasses
  description: With an integrated heads-up display, it's understandable that these glasses would be on the thicker side, but I think that whoever made these just wanted to look like a bug-eyed weirdo.
  components:
  - type: Sprite
    sprite: _Moffstation/Clothing/Eyes/Hud/jamjars.rsi
  - type: Item
    sprite: _Moffstation/Clothing/Eyes/Hud/jamjars.rsi
  - type: Clothing
    sprite: _Moffstation/Clothing/Eyes/Hud/jamjars.rsi
  - type: ModularHudVisuals
    speciesWithDifferentClothing:
    - arachnid
    - hamster
    - moth
    inhandExcludedLayers:
      default:
      - Accent
  - type: Tag
    tags:
    - FullEyeCovering

- type: entity
  parent: ClothingEyesModularHudBase
  id: ClothingEyesModularHudVisor
  name: modular HUD visor
  description: A sleek, futuristic visor capable of providing information on a holographic heads-up display. They say it took over nine thousand prototypes to get it right.
  components:
  - type: Sprite
    sprite: _Moffstation/Clothing/Eyes/Hud/visor.rsi
  - type: Item
    sprite: _Moffstation/Clothing/Eyes/Hud/visor.rsi
  - type: Clothing
    sprite: _Moffstation/Clothing/Eyes/Hud/visor.rsi
  - type: ModularHudVisuals
    speciesWithDifferentClothing:
    - arachnid
    - dog
    - moth
    inhandExcludedLayers:
      default:
      - Accent
      - LensAccentMajor
    equippedExcludedLayers:
      default:
      - LensAccentMajor
  - type: ModularHud
    maximumContainedModules: 3

## Abstract Modular HUD protos. Combine these with one of the HUDs above as parents to get functioning HUDs.
- type: entity
  id: AbstractModularHudChef
  abstract: true
  suffix: Chef
  components:
  - type: EntityTableContainerFill
    containers:
      modular-hud-modules: !type:AllSelector
        children:
        - id: HudModuleShowHungerIcons
  - type: Label
    currentLabel: modularhud-premade-food

