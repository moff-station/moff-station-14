    - state: contacts
    - state: eng_label
  - type: ModularHudModule
    visuals:
      lens:
        color: *diagnosticorange
        priority: 100
  - type: ShowHealthBars
    damageContainers:
    - Inorganic
    - Silicon

- type: entity
