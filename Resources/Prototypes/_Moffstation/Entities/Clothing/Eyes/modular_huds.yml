# This abstract base modular HUD defines a bunch of visual boilerplate needed to get the dymanic sprites to work, as
# well as the basic common modular HUD stuff like the container.
- type: entity
  parent: BaseItem
  id: ModularHudModuleBase
  abstract: true
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Devices/modularhudmodule.rsi
  - type: ModularHudModule

# TODO Night vision
# TODO Toggleable functionality

# Visuals color priorities are:
# - critical = 1000 (you really wanna be able to see this at a glance)
# - job important = 0100
# - job related, but not important: 0010
# - fluff: 0001
#
# Elevated importance can fill the space up to 5x the normal value;
# Reduced importance can fill the space down to 1/2 the normal value.

- type: entity
  parent: ModularHudModuleBase
  id: HudModuleShowAccessReaderSettings
  name: access level HUD module
  description: A heads-up display module which allows for reading access levels of airlocks and other lockable devices.
  components:
  - type: Sprite
    layers:
    - state: base
      color: White
    - state: stripe
      color: ForestGreen
    - state: contacts
    - state: eng_label
  - type: ModularHudModule
    visuals:
      Accent:
        color: Green
        priority: 7
  - type: ShowAccessReaderSettings

- type: entity
  parent: ModularHudModuleBase
  id: HudModuleSecurity
  name: security HUD module
  description: A heads-up display module which scans the humanoids in view and provides accurate data about their ID, mindshield, and criminal record status.
  components:
  - type: Sprite
    layers:
    - state: base
      color: White
    - state: stripe
      color: &slateblue "#4675C0"
    - state: contacts
    - state: sec_label
  - type: ModularHudModule
    visuals:
      Lens:
        color: Red
        priority: 40
  - type: ShowJobIcons
  - type: ShowMindShieldIcons
  - type: ShowCriminalRecordIcons
  - type: ShowContrabandDetails

- type: entity
  parent: ModularHudModuleBase
  id: HudModuleSolutionScanner
  name: chemical analysis HUD module
  description: A heads-up display module which allows scanning the chemical composition of a solution.
  components:
  - type: Sprite
    layers:
    - state: base
      color: White
    - state: stripe
      color: *slateblue
    - state: contacts
    - state: medsci_label
  - type: ModularHudModule
    visuals:
      lens:
        color: Purple
        priority: 100
  - type: SolutionScanner

- type: entity
  parent: ModularHudModuleBase
  id: HudModuleFlashImmunity
  name: flash protection HUD module
  description: A heads-up display module which protects the eyes from bright flashes.
  components:
  - type: Sprite
    layers:
    - state: base
      color: White
    - state: stripe
      color: Black
    - state: contacts
    - state: sec_label
  - type: ModularHudModule
    requirements:
    - &fulleyereq
      failureMessage: "modular-hud-requirement-full-coverage"
      whitelist:
        tags:
        - FullEyeCovering
    visuals:
      lens:
        color: Black
        priority: 1000
      # Sunglasses look awful with bright white specular highlights, so this removes them.
      specular:
        color: "#FFFFFF10"
        priority: 1000
  - type: FlashImmunity

- type: entity
  parent: ModularHudModuleBase
  id: HudModuleCheapSunglasses
  name: cheap tint HUD module
  description: Makes you feel like a badass.
  components:
  - type: Sprite
    layers:
    - state: base
      color: White
    - state: stripe
      color: Black
    - state: contacts
    - state: sec_label
  - type: ModularHudModule
    requirements:
    - *fulleyereq
    visuals:
      lens:
        color: Black
        priority: 1000
      # Sunglasses look awful with bright white specular highlights, so this removes them.
      specular:
        color: "#FFFFFF30"
        priority: 1000
  - type: IdentityBlocker
    coverage: EYES

- type: entity
  parent: ModularHudModuleBase
  id: HudModuleVisionCorrection
  name: prescription HUD module
  description: A heads-up display module which partially refracts incoming light to correct for vision impairments.
  components:
  - type: Sprite
    layers:
    - state: base
      color: &civiliangray "#DEDEDE"
    - state: stripe
      color: White
    - state: contacts
    - state: med_label
  - type: ModularHudModule
    requirements:
    - *fulleyereq
    visuals:
      accent:
        color: CornflowerBlue
        priority: 1
  - type: VisionCorrection

- type: entity
  parent: ModularHudModuleBase
  id: HudModuleShowJobIcons
  name: administration HUD module
  description: A heads-up display module which scans the humanoids in view and provides accurate data about their ID status.
  components:
  - type: Sprite
    layers:
    - state: base
      color: White
    - state: stripe
      color: ForestGreen
    - state: contacts
    - state: hop_label
  - type: ModularHudModule
    visuals:
      lens:
        color: CornflowerBlue
        priority: 50
      accent:
        color: Goldenrod
        priority: 50
  - type: ShowJobIcons

- type: entity
  parent: ModularHudModuleBase
  id: HudModuleNoirOverlay
  name: noir-tech HUD module
  description: A heads-up display module which simulates what the world looked like before the invention of color.
  components:
  - type: Sprite
    layers:
    - state: base
      color: "#909090"
    - state: stripe
      color: Red
    - state: contacts
    - state: common_label
  - type: ModularHudModule
    requirements:
    - *fulleyereq
    visuals:
      lens:
        color: "#808080"
        priority: 10001 # Because of memes, this is critically important to have as the highest priority.
        preventsOtherColors: true # ... and the only color.
      specular:
        color: "#FFF0F0"
        priority: 10001 # Because of memes, this is critically important to have as the highest priority.
  - type: NoirOverlay

- type: entity
  parent: ModularHudModuleBase
