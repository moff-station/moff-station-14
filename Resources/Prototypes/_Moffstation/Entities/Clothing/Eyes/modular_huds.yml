    layers:
    - state: base
      color: Gray
    - state: stripe
      color: White
    - state: contacts
    - state: common_label
  - type: ModularHudModule
    requirements:
    - *fulleyereq
    visuals:
      lens:
        color: gray
        priority: 4
  - type: BlackAndWhiteOverlay

- type: entity
  parent: ModularHudModuleBase
