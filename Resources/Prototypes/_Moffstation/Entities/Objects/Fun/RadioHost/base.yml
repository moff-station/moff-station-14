# Base Vinyl Disk
- type: entity
  parent: BaseItem
  id: BaseVinylDisc
  name: vinyl disc
  description: A flat round disc with music encoded onto it's surface. Very fragile!
  abstract: true
  components:
  #- type: MusicDisk # TODO, attach sound to disk via component.
  #  audioTrack: /Audio/_Moffstation/MusicDisks/Music/<NAME>.oog
  - type: Sprite
    sprite: _Moffstation/Objects/Fun/RadioHost/vinyl.rsi
    state: default
  # To create a custom Vinyl using layers, use the following template.
  # sprite: _Moffstation/Objects/Fun/RadioHost/vinyl.rsi
  # state: default
  # layers:             
  # - state: base-dark  # Choose either "base-dark", "base-medium" or "base-light".
  #   color: pink       # The lighter the base, the more color will show through.
  # - state: label      # Requires a label.
  #   color: "#20b024"  # Adjust label color.
  # - state: base-shine # Gives the vinyl a shine.
  #   color: "#20b024"  # Give the shine a color to create some awesome looking Vinyls.
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
          params:
            volume: -4
      - !type:SpawnEntitiesBehavior
        spawn:
          VinylBroken:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageOnLand
    ignoreResistances: true
    damage:
      types:
        Blunt: 5
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 5
  - type: Tag
    tags:
    - VinylSleeveFit

- type: entity
  parent: BaseVinylDisc
  id: BaseVinylSlippery
  components:
  - type: Slippery
  - type: CollisionWake
    enabled: false
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      slips:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.3,0.4,0.3"
        hard: false
        layer:
        - SlipLayer

- type: entity
  parent: BaseItem
  id: VinylBroken
  name: broken vinyl disc
  description: A vinyl disk that has been broken into pieces. It is completely unplayable.
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Fun/RadioHost/vinyl.rsi
    state: broken-vinyl-disc
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
          params:
            volume: -4
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlass:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

# Base CD Disc
- type: entity
  parent: BaseVinylDisc
  id: BaseCDDisc
  name: cd disk
  description: A compact disc with sound encoded onto it's surface. Requires care when handling.
  abstract: true
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Fun/RadioHost/cds.rsi
    state: icon
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - CD

# Base Disk Sleeve
- type: entity
  parent: BaseItem
  id: BaseVinylSleeve
  name: vinyl disc sleeve
  description: A sleeve designed to hold and store vinyl disks.
  abstract: true
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Fun/RadioHost/sleeves.rsi
    state: plainwhite-vinyl-sleeve
  - type: ItemSlots
    slots:
      vinyl:
        name: vinyl
        insertSound: /Audio/_Goobstation/RadioStation/Vinyls/vinylEject.ogg
        ejectSound: /Audio/_Goobstation/RadioStation/Vinyls/vinylInsert.ogg
        whitelist:
          tags:
          - VinylSleeveFit
  - type: ContainerContainer

- type: entity
  parent: BaseItem
  id: BaseVinylSleeveFilled
  name: vinyl disc sleeve
  description: A sleeve designed to hold and store vinyl disks.
  abstract: true
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Fun/RadioHost/sleeves.rsi
    state: plainwhite-vinyl-sleeve
  - type: ItemSlots
    slots:
      vinyl:
        name: vinyl
        insertSound: /Audio/_Goobstation/RadioStation/Vinyls/vinylEject.ogg
        ejectSound: /Audio/_Goobstation/RadioStation/Vinyls/vinylInsert.ogg
        whitelist:
          tags:
          - VinylSleeveFit
  - type: ContainerContainer
  - type: EntityTableContainerFill # By default just put a random one in there.
    containers:
      vinyl: !type:NestedSelector
        tableId: RandomVinylDisc

# Testing Vinyl for Trying out different layering.
- type: entity
  parent: BaseVinylDisc
  id: TestVinyl
  name: Test vinyl disc
  suffix: TEST
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Fun/RadioHost/vinyl.rsi
    state: default
    layers:
    - state: base-medium
      color: "#9a3d8c"
    - state: label
      color: "#20b024"
    - state: base-shine
      color: "#20b024"
