# Not really a flatpack but named this way because there are many types of boxes
# basically use this like a flatpack, except without needing a tool
# Add the SpawnOnTrigger component to make it spawn something, and people can hover 'e' to unbox it
# also set 'UseMapCoords' to true or it will bug out
- type: entity
  parent: BaseItem
  id: BaseFlatpackHands
  name: Boxed Nothing
  description: A box containing nothing. Allegedly. Can be unboxed to place... nothing.
  abstract: true
  components:
  - type: Sprite
    sprite: Objects/Specific/Cargo/mail_large.rsi
    state: icon
  - type: TriggerOnActivate
  - type: DeleteOnTrigger
  - type: EmitSoundOnTrigger
    positional: true
    predicted: true
    sound:
      path: /Audio/Effects/unwrap.ogg
