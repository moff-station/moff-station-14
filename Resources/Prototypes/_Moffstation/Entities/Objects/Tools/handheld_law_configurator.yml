- type: entity
  id: LawProgrammer
  parent: [BaseItem, BaseScienceContraband]
  name: handheld cyborg programmer
  description: A handy device to transfer laws from a law board to a cyborg brain.
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Tools/law_configurator.rsi
    state: empty
    layers:
    - state: empty
    - state: full
    shader: unshaded
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.LawReprogrammerVisuals.Status:
        base:
          Empty: { state: empty }
          Full: { state: full }
  - type: Item
    sprite: _Moffstation/Objects/Tools/law_configurator.rsi
    state: icon
    storedRotation: -90
  - type: ItemSlots
    slots:
      law_board_slot:
        ejectOnBreak: true
        whitelistFailPopup: reprogrammer-insertion-failure-popup
        whitelist:
          tags:
          - LawBoard
  - type: LawProgrammer
    attemptSound: /Audio/Machines/double_ring.ogg
    successSound: /Audio/Machines/twobeep.ogg
    failureSound: /Audio/Machines/custom_deny.ogg
  - type: UserInterface
    interfaces:
      enum.LawProgrammerUiKey.Key:
        type: LawProgrammerBoundUserInterface
  - type: ActivatableUI
    key: enum.LawProgrammerUiKey.Key
    inHandsOnly: true

