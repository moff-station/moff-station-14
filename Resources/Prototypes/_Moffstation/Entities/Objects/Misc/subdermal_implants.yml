  description: Gives the user the ability to speak a perfect french accent
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    implantComponents:
    - type: FrenchAccentToggle
  - type: Tag
    tags:
    - SubdermalImplant
