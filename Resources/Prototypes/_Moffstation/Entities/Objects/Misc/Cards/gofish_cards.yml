# Go Fish Cards
- type: entity
  parent: BasePlayingCardDeckBox
  id: GoFishCardDeckBox
  name: box of go fish cards
  suffix: GoFish
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Misc/Cards/card_gofish.rsi
  - type: ContainerFill
    containers:
      storagebase:
      - GoFishCardDeck

- type: entity
  parent: BasePlayingCardDeck
  id: GoFishCardDeck
  name: deck of cards
  suffix: GoFish
  components:
  - type: Sprite
    layers:
    - state: empty # Dummy layer because the actual visuals are composed dynamically.
      sprite: _Moffstation/Objects/Misc/Cards/card_gofish.rsi
      visible: False
  - type: PlayingCardDeck
    prototype: StandardGoFishCards

# GoFish Deck Definitions
- type: playingCardDeck
  id: StandardGoFishCards
  sprite: _Moffstation/Objects/Misc/Cards/card_gofish.rsi
  commonReverseLayers:
  - state: singlecard_down_gofish
  cardNameLoc: gofish-card-name
  cardDescLoc: gofish-card-desc
  cardReverseNameLoc: gofish-card-name-reverse
  cardReverseDescLoc: gofish-card-desc-reverse
  suitLoc: gofish-card-suit-name
  cardValueLoc: gofish-card-value-name
  cards:
  #- id: rules
  - prototype: GoFishRulesCard
  - suit: GoFishBlue
  - suit: GoFishGreen
  - suit: GoFishRed
  - suit: GoFishYellow

- type: entity
  parent: [ BasePlayingCard ]
  id: GoFishRulesCard
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Misc/Cards/card_gofish.rsi
    state: rules
  - type: Paper # Don't want to parent off BasePaper or Paper to avoid inheriting PaperVisuals and Sprite layers.
    editingDisabled: true # It's a personal item, protected from editing.
    content: |
      ══════════════════════════════════════

                                             [head=1]Go Fish![/head] 
                          [head=4]Card Game Rules & How to Play[/head]
      ══════════════════════════════════════

          [head=2]Introduction:[/head]
      Go Fish is a classic card game designed to be played by 2-6 players. The goal of Go Fish! is to collect all four cards from the same group to score points.

      ══════════════════════════════════════

          [head=2]Setup:[/head]
      To start a game of Go Fish, begin by shuffling the deck. The amount of cards you would then deal depends on the number of players...
        • 2-3 players: Deal 7 cards each.
        • 4-6 players: Deal 5 cards each.
      Once the cards have been dealt, return the deck to the middle of the table face down.

      ══════════════════════════════════════

          [head=2]Gameplay:[/head]
      Players will take turn asking another player if they have a card belonging to a specific group. The asking player may only asks for cards from a specific group, if they hold one of those cards in their hand.

              [bold]Player 1:[/bold] Hey Player 2, got any Mothroaches?
      [italic]Player 2 must surrender all Mothroach cards to Player 1 if they have any in their possesion. If this is the case, Player 1 can continue their turn and ask another player, repeating until they get one wrong.[/italic]
              [bold]Player 1:[/bold] Hey Player 3, got any Mothroaches?
      [italic]If the player doesn't have the a card belonging to that group, they can respond with "Go Fish!"[/italic]
                                                        [bold]Player 2:[/bold] Nope! Go Fish!
      [italic]Player 1 would then draw a card from the deck. If they manage to draw a card belonging to a group they just asked for, then they must announce that and continue their turn.[/italic]
              [bold]Player 1:[/bold] I drew a Mothroach! I get to go again!
      [italic]If the card does not match the group they asked for, then the next player in the turn order begins their turn.[/italic]

      ══════════════════════════════════════

          [head=2]How To Win:[/head]
      If a player manages to collect all four cards belonging to the same group, the player must place the four cards face up on the table and announce it to the other players.
      For every set a player collects, they score [bold]one point[/bold].

      The game ends when there are no cards left in the deck and all groups have been united. The player who has the most points will be declared the winner!

      ══════════════════════════════════════


          [head=2]Tips for Playing Go Fish![/head]
      There are 13 groups in a standard Go Fish! deck.
      Each group has four cards, with each card having a border color of either [bold][color=Red]Red[/color][/bold], [bold][color=DodgerBlue]Blue[/color][/bold] [bold][color=LimeGreen]Green[/color][/bold] or [bold][color=GoldenRod]Yellow[/color][/bold].
      The 13 groups are as follows...
      [mono][bold]1:[/bold] Card         [bold]6:[/bold] Cats       [bold]11:[/bold] Plushies  
      [bold]2:[/bold] Cigarettes   [bold]7:[/bold] Fruit      [bold]12:[/bold] Soda
      [bold]3:[/bold] Corgis       [bold]8:[/bold] Mice       [bold]13:[/bold] Troublemakers
      [bold]4:[/bold] Donuts       [bold]9:[/bold] Mothroachs
      [bold]5:[/bold] ERT         [bold]10:[/bold] Nukies
      [/mono]

        • Remember to [bold]pay attention[/bold] to what other players ask for!

        • [bold]Remember who has which cards[/bold] so your guesses can be more successful!

        • [bold]Avoid exposing cards[/bold] which you are a close to completing a set with!

        • [bold]Remember to have fun![/bold]
  - type: ActivatableUI
    key: enum.PaperUiKey.Key
    requiresComplex: false
  - type: UserInterface
    interfaces:
      enum.PaperUiKey.Key:
        type: PaperBoundUserInterface
  - type: PlayingCard
    obverseLayers:
    - state: rules
      sprite: _Moffstation/Objects/Misc/Cards/card_gofish.rsi
    reverseLayers:
    - state: singlecard_down_gofish
      sprite: _Moffstation/Objects/Misc/Cards/card_gofish.rsi
    name: Go Fish! Rules Card
    reverseName: playing card
    description: This is the rules card! You may read it to get a better understanding of the rules.

