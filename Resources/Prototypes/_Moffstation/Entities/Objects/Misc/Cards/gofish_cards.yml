# Go Fish Cards
- type: entity
  parent: BasePlayingCardDeckBox
  id: GoFishCardDeckBox
  name: box of go fish cards
  suffix: GoFish
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Misc/Cards/card_gofish.rsi
  - type: ContainerFill
    containers:
      storagebase:
      - GoFishCardDeck

- type: entity
  parent: BasePlayingCardDeck
  id: GoFishCardDeck
  name: deck of cards
  suffix: GoFish
  components:
  - type: PlayingCardDeck
    prototype: StandardGoFishCards

- type: playingCardDeck
  parent: BaseGoFishDeck
  id: StandardGoFishCards
  sprite: _Moffstation/Objects/Misc/Cards/card_gofish.rsi


# Base definitions
- type: playingCardDeck
  id: BaseGoFishDeck
  abstract: true
  commonReverseLayers:
  - state: singlecard_down_gofish
  cardNameLoc: gofish-card-name
  cardDescLoc: gofish-card-desc
  cardReverseNameLoc: gofish-card-name-reverse
  cardReverseDescLoc: gofish-card-desc-reverse
  suitLoc: gofish-card-suit-name
  cardValueLoc: gofish-card-value-name
  cards:
  - suit: GoFishRules
  - suit: GoFishBlue
  - suit: GoFishGreen
  - suit: GoFishRed
  - suit: GoFishYellow

- type: playingCardSuit
  id: GoFishRules
  cards:
  - id: "rules" # Rules card

- type: playingCardSuit
  id: GoFishBlue
  commonObverseLayers:
