- type: entity
  name: chits
  parent: FoodSnackBase
  id: FoodSnackChits
  description: A bag of fried cotton made by moths for moths!
  components:
  - type: FlavorProfile
    flavors:
    - oily
    - cottons
  - type: Sprite
    sprite: _Moffstation/Objects/Consumable/Food/snacks.rsi
    state: chits
  - type: Item
    heldPrefix: chits
  - type: Edible
    trash:
    - FoodPacketChitsTrash
  - type: Tag
    tags:
    - FoodSnack
    - ClothMade
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 30
        reagents:
        - ReagentId: Nutriment
          Quantity: 5
        - ReagentId: Fiber
          Quantity: 10

- type: entity
  categories: [ HideSpawnMenu ]
  parent: FoodPacketTrash
  id: FoodPacketChitsTrash
  name: chits
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Consumable/Food/snacks.rsi
    state: chits-trash
  # todo need inhands

- type: entity
  parent: FoodSnackChocolate
  id: FoodSnackChocolateSyndie
  name: Panzerschokolade
  description: Tastes like runing.
  components:
  - type: SpawnItemsOnUse
    items:
      - id: FoodPacketChocolateTrash
      - id: FoodSnackChocolateBarSyndie
    sound:
      path: /Audio/Effects/unwrap.ogg

- type: entity
  parent: FoodSnackChocolateBar
  id: FoodSnackChocolateBarSyndie
  name: Panzerschokolade
  description: Tastes like runing.
  components:
  - type: FlavorProfile
    flavors:
      - chocolate
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 30
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
        - ReagentId: Theobromine
          Quantity: 3
        - ReagentId: CocoaPowder 
          Quantity: 1
        - ReagentId: Ephedrine 
          Quantity: 15
