# Hallelujah !
- type: entity
  id: BaseBulletSilver
  name: base bullet silver
  parent: BaseBullet
  abstract: true
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: silver
  - type: PointLight
    enabled: true
    color: "#FFFFCC"
    radius: 2.0
    energy: 7.0
  - type: Projectile
    damage:
      types:
        Blunt: 1
        Holy: 13

- type: entity
  parent: GrapplingHook
  id: ChainSickle
  name: chain sickle
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Launchers/chainsickle.rsi
  - type: Ammo
    muzzleFlash: null
  - type: Projectile
    deleteOnCollide: false
    penetrationThreshold: 1000
    damage:
      types:
        Slash: 20
    soundHit:
      path: "/Audio/_Moffstation/Surgery/retractor2.ogg"
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.1,0,0.1" # Asymmetric - favors the pointy side
        mask:
        - Impassable
        - BulletImpassable

- type: entity
  parent: [BaseItem]
  id: MetalBolt
  abstract: true
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: /Moffstation/Objects/Weapons/Guns/Projectiles/metal_bolts.rsi
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeCircle
          radius: 0.2
        density: 5
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.3,0.1,-0.1"
        hard: false
        mask:
        - Impassable
        - BulletImpassable
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/star_hit.ogg
    embedOnThrow: false
  - type: ThrowingAngle
    angle: 0
  - type: Ammo
  - type: Tag
    tags:
    - Arrow
  - type: Projectile
    deleteOnCollide: false
    onlyCollideWhenShot: true
    damage:
      types:
        Blunt: 25
        Heat: 15
