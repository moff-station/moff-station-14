- type: entity
  parent: BaseCannonBall
  id: CannonBallBouncy
  name: gutterball
  suffix: Pirate, Cannonball
  description: Yer last boatswain was keelhauled for getting swindled into decking the gunwale with beach balls.
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
    state: bouncy 
  - type: CartridgeAmmo
    proto: BulletCannonBallBouncy
    deleteOnSpawn: true

- type: entity
  parent: [ BaseItem, BaseMajorContraband ]
  id: BulletCannonBallBouncy
  name: gutterball
  description: Look out --
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
      - state: plasbouncy
  - type: Clickable
  - type: Physics
    bodyType: Dynamic
  - type: TimedDespawn
    lifetime: 10
  - type: SpawnOnDespawn
    prototype: CannonBallBouncy  # Reusable cannonbouncy
  - type: EmitSoundOnCollide
    sound:
      path: /Audio/Effects/Footsteps/bounce.ogg
  - type: Fixtures
    fixtures:
      projectile:
        shape: !type:PhysShapeCircle
          radius: 0.3
          position: "0,-0.2"
        mask:
          - Impassable
          - BulletImpassable
        restitution: 0.99 # nearly perfect bouncy
  - type: TileFrictionModifier
    modifier: 0.004
  - type: TriggerOnCollide
    fixtureID: projectile
    maxTriggers: null
  - type: LaunchOnTrigger
    impulse: 120
    targetUser: true
  - type: StunOnCollide
    knockdownAmount: 2.0 
    drop: false
    slowdownAmount: 2.0
    walkSpeedModifier: 0.5
    sprintSpeedModifier: 0.5
  - type: PointLight
    color: salmon
    radius: 2
    energy: 2

- type: entity
  parent: BaseCannonBall
  id: CannonBallStructureSplitting
  name: spike of neptune
  suffix: Pirate, Cannonball
  description: A hefty spike of polished plasmarble, to cut a line straight and true. Courteously provides some holocanvas to keep the winds still.
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
    state: spike 
  - type: CartridgeAmmo
    proto: BulletCannonBallStructureSplitting
    deleteOnSpawn: true

- type: entity
  name: spike of neptune
  id: BulletCannonBallStructureSplitting
  parent: BaseBullet
  description: Knock knock.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
      - state: plasmarball
  - type: TriggerOnCollide
    fixtureID: projectile
    maxTriggers: null
  - type: SpawnOnTrigger
    proto: HoloFan
  - type: Projectile
    penetrationThreshold: 855 # This is the minimum to pierce two (2) reinf walls
    damage:
      types:
        Piercing: 50
        Structural: 350   # This is the minimum to pierce one (1) reinf wall
    ignoreResistances: true
  - type: TimedDespawn
    lifetime: 30   # Longer range than base bullet
  - type: PointLight
    color: salmon
    radius: 2
    energy: 2

- type: entity
  parent: BaseCannonBall
  id: CannonBallGasNitrous
  name: sleeping carcass
  suffix: Pirate, Cannonball
  description: A cannonball stuck through with glass phials, camphor, nitre, and salmiac. Its shape reminds you of a body dredged from a wreck.
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
    state: carcass 
  - type: CartridgeAmmo
    proto: BulletCannonBallGasNitrous
    deleteOnSpawn: true

- type: entity
  id: BulletCannonBallGasNitrous
  name: sleeping carcass
  parent: BaseBullet
  description: Night night.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
      - state: plasmarball
  - type: TriggerOnCollide
    fixtureID: projectile
    maxTriggers: Null
  - type: EmitSoundOnTrigger
    sound: /Audio/Items/smoke_grenade_smoke.ogg
  - type: SmokeOnTrigger # This is a courtesy, because nitrous is invisible
    duration: 10
    spreadAmount: 40
  - type: ReleaseGasOnTrigger
    removeFraction: 0.5
    air:
      volume: 1000
      moles: # 3117.84 mols fills 30 tiles (101.325 kPa @ 20C), so this is enough to make a 100-tile room sleepy
        NitrousOxide: 3111.00 # nitrogen
      temperature: 293.15
  - type: StaminaDamageOnCollide
    damage: 130
  - type: TimedDespawn
    lifetime: 30   # Longer range than base bullet
  - type: PointLight
    color: salmon
    radius: 2
    energy: 2
