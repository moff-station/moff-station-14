- type: entity
  parent: BaseCannonBall 
  id: CannonBallStructureSplitting
  name: gunstone spike
  suffix: Pirate
  description: A hefty spike of polished plasmarble, to cut a line straight as a cutlass would. 
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
    state: plasmarball
  - type: CartridgeAmmo
    proto: BulletCannonBallStructureSplitting
    deleteOnSpawn: true

- type: entity
  name: gunstone
  id: BulletCannonBallStructureSplitting
  parent: BaseBullet
  description: Knock knock.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
      - state: plasmarball
  - type: TriggerOnCollide
    fixtureID: projectile
    maxTriggers: 5 # You will blow through This Many Divided By Two walls
  - type: PointLight
    radius: 1.6
    color: "#800080"
    energy: 3.5
  - type: SpawnOnTrigger
    proto: HoloFan
  - type: Projectile
    penetrationThreshold: 950
    damage:
      types:
        Piercing: 50
        Structural: 400   # This is the minimum to pierce one (1) reinf wall
    ignoreResistances: true

- type: entity
  parent: BaseCannonBall 
  id: CannonBallGasNitrous
  name: sleeping carcass
  suffix: Pirate
  description: A cannonball stuck through with glass phials and reactive metals. 
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
    state: plasmarball
  - type: CartridgeAmmo
    proto: BulletCannonBallGasNitrou
    deleteOnSpawn: true

- type: entity
  id: BulletCannonBallGasNitrous
  name: gunstone
  parent: BaseBullet
  description: Night night. 
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
      - state: plasmarball
  - type: TriggerOnCollide
    fixtureID: projectile
    maxTriggers: 1
  - type: SmokeOnTrigger
    keysIn:
    - timer
    duration: 30
    spreadAmount: 50
  - type: ReleaseGasOnTrigger
    keysIn:
    - timer
    removeFraction: 1
    air:
      volume: 1000
      moles: # Target is 3117.84 mols total for filling 30 tiles (goal is 101.325 kPa @ 20C)
        NitrousOxide: 3117.84 # nitrogen
      temperature: 293.15
  - type: Projectile
    damage:
      types:
        Blunt: 5
  - type: StaminaDamageOnCollide
    damage: 130
