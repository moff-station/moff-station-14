# Holy shit
- type: entity
  parent: BaseItem
  id: Gungler
  name: gungler
  description: I am become Death, the destroyer of worlds.
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Other/gungler.rsi
    layers:
    - state: icon
  - type: Item
    size: Ginormous
    sprite: _Moffstation/Objects/Weapons/Guns/Other/gungler.rsi
  - type: MultiHandedItem
  - type: AmmoCounter
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/lmg_cock.ogg
    autoEject: true
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineLightRifleBox
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          components:
          - BallisticAmmoProvider
      gun_chamber:
        name: Chamber
        priority: 1
        whitelist:
          components:
          - CartridgeAmmo # Just put whatever in it - who cares
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: Gun
    fireRate: 20 # All the fire rate
    burstFireRate: 100
    burstCooldown: 0.05
    selectedMode: SemiAuto
    availableModes: # All the fire modes
    - Burst
    - SemiAuto
    - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/lmg.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
