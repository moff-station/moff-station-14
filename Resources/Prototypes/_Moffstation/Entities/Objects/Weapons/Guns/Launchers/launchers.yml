- type: entity
  parent: WeaponLauncherHydra
  id: WeaponLauncherHydraFrag
  suffix: Lethal
  components:
  - type: RevolverAmmoProvider
    proto: GrenadeFrag
    capacity: 6
    chambers: [ True, True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null, null ]
    soundEject:
      path: /Audio/Weapons/Guns/MagOut/sfrifle_magout.ogg
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/sfrifle_magin.ogg

- type: entity
  parent: WeaponGrapplingGun
  id: WeaponNinjaChainSickle
  name: chain sickle
  description: A sickle attached to a websilk chain. The Spider Clan embodies the ancient ways, even as they steal the future.
  components:
  - type: GrapplingGun
    reelMassCoefficient: 200 # You can pull everyone.
    reelForce: 20000 # STRONG reeling, you can now make them GET OVER HERE
    reelRate: 7.5 # Fast reeling - can move very quickly in combat with this
    ropeBreakPoint: 150000 # Strong rope for ninja tricks
    cycleSound: /Audio/_Moffstation/Surgery/retractor1.ogg
    ropeSprite:
      sprite: _Moffstation/Objects/Weapons/Guns/Launchers/chainsickle.rsi
      state: rope
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/bolathrow.ogg
    offset: -0.15,0.0
  - type: LandAtCursor
  - type: Ensnaring
    freeTime: 2.0
    breakoutTime: 30 # punishing chains
    walkSpeed: 0.8
    sprintSpeed: 0.9
    staminaDamage: 100
    canThrowTrigger: true
    canMoveBreakout: true
    maxEnsnares: 1
  - type: Gun
    soundGunshot: /Audio/Weapons/utilityknifeopen.ogg
    fireRate: 1.0
    soundEmpty: /Audio/_Moffstation/Surgery/retractor1.ogg
  - type: Item
    size: Small
    shape:
      - 0,1,0,1
      - 0,0,1,0
    storedOffset: 0,-6
  - type: BasicEntityAmmoProvider
    proto: ChainSickle
    capacity: 1
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Launchers/chainsickle.rsi
    state: base
  - type: UseDelay
    delay: 0.5

- type: entity
  parent: [ BaseBowVisuals ]
  id: RebarCrossbow
  name: Rebar Crossbow
  description: Gordon Freeman?
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/launchers/rebar-crossbow.rsi
  - type: Item
    size: ginormous
  - type: Clothing
    quickEquip: false
    slots:
      - Back
      - suitStorage
  - type: Wieldable
    wieldSound:
      path: /Audio/Items/bow_pull.ogg
  - type: UseDelay
    delay: 1.5
  - type: GunRequiresWield
  - type: Gun
    minAngle: 0
    maxAngle: 5
    fireRate: 1
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      collection: BulletMiss
    soundEmpty: null
  - type: ItemSlots
    slots:
      projectiles:
        name: Projectiles
        startingItem: null
        insertSound: /Audio/Weapons/Guns/Misc/arrow_nock.ogg
        whitelist:
          tags:
          - Arrow
          - Plunger
  - type: ContainerContainer
    containers:
      projectiles: !type:ContainerSlot
  - type: ContainerAmmoProvider
    container: projectiles
