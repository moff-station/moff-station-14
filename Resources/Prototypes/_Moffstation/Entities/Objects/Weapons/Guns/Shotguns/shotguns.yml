  description: A premium semi-automatic shotgun, and the pride of all security forces. With the choke sawn-off the accuracy of this gun turns into a hypothethical question. Uses .50 shotgun shells.
  components: # intend for Enforcer to have wider choke for semi-auto function
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Shotguns/enforcer_sawn.rsi
