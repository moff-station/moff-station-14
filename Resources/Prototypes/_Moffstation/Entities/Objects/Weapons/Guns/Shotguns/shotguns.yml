- type: entity
  name: Blackbox shotgun
  parent: BaseWeaponShotgun
  id: WeaponShotgunBlackbox
  description: An old yet faithful design, and a favorite among irregular forces of many worlds. Uses .50 shotgun shells.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Shotguns/blunderbuss.rsi
  - type: Gun
    fireRate: 1
  - type: AmmoCounter
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: BallisticAmmoSelfRefiller
    autoRefillRate: 8s
    affectedByEmp: true

- type: entity # Kammerer in independent colors, for use by mercenaries and pirates.
  parent: WeaponShotgunKammerer
  id: WeaponShotgunKammererOld
  suffix: Old
  description: "A beaten-up pump-action shotgun. A model originating from Old Earth, this weapon features original wooden furniture, commonly found on the black market. A choke on the muzzle keeps the spread tight, improving long-range performance but requiring more careful aim.\nLoads seven .50 shells."
  components:
  - type: Item
    sprite: _Moffstation/Objects/Weapons/Guns/Shotguns/pump_old_inhands_64x.rsi
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Shotguns/pump_old.rsi
  - type: Clothing
    sprite: _Moffstation/Objects/Weapons/Guns/Shotguns/pump_old.rsi

- type: entity
  parent: [BaseWeaponShotgun, BaseGunWieldable, BaseSyndicateContraband]
  id: WeaponShotgunHushpupSawed
  name: Sawed-Off Hushpup
  description: This seems absolutely unnecessary to saw the suppresor off.
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Shotguns/hushpup_sawn.rsi
  - type: Clothing
    sprite: _Moffstation/Objects/Weapons/Guns/Shotguns/hushpup_sawn.rsi
  - type: Item
    sprite: _Moffstation/Objects/Weapons/Guns/Shotguns/hushpup_sawn.rsi
    shape:
    - 0,0,3,0 # smaller than BaseShotgun by 1 tile
  - type: BallisticAmmoProvider
    capacity: 4
  - type: GunRequiresWield
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/shotgun.ogg
      params:
        volume: -3
        rolloffFactor: 1.3
    fireRate: 2
  - type: GunSpreadModifier
    spread: 1.2

- type: entity
  name: Sawed-Off Enforcer
  parent: [BaseWeaponShotgun, BaseGunWieldable, BaseSecurityContraband]
  id: WeaponShotgunEnforcerSawn
  description: A premium semi-automatic shotgun, and the pride of all security forces. The barrel and the stock has been sawed off. Uses .50 shotgun shells.
  components: # intend for Enforcer to have wider choke for semi-auto function
  - type: Sprite
    sprite: _Moffstation_Objects/Weapons/Guns/Shotguns/enforcer.rsi
  - type: Clothing
    sprite: _Moffstation/Objects/Weapons/Guns/Shotguns/enforcer.rsi
  - type: Item
    sprite: _Moffstation/Objects/Weapons/Guns/Shotguns/enforcer_inhands_64x.rsi
    shape:
    - 0,0,4,0
  - type: BallisticAmmoProvider
  - type: GunRequiresWield #remove when inaccuracy on spreads is fixed
  - type: GunSpreadModifier
    spread: 1.2

- type: entity
  name: Sawed-Off Kammerer
  parent: [BaseWeaponShotgun, BaseGunWieldable, BaseSecurityContraband]
  id: WeaponShotgunKammerersawn
  description: An old yet faithful design, and a favorite among irregular forces of many worlds. The barrel and the stock has been sawed off. Uses .50 shotgun shells.
  components: # intend for Kammerer to have tighter choke for slower fire rate and/or manual cycling
  - type: Item
    sprite: _Moffstation/Objects/Weapons/Guns/Shotguns/pump_sawn_inhands_64x.rsi
    shape:
    - 0,0,4,0
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Shotguns/pump_sawn.rsi
  - type: Clothing
    sprite: _Moffstation/Objects/Weapons/Guns/Shotguns/pump_sawn.rsi
  - type: GunRequiresWield #remove when inaccuracy on spreads is fixed
  - type: Gun
    fireRate: 1
  - type: GunSpreadModifier
    spread: 0.8
  - type: Tag
    tags:
    - WeaponShotgunKammerer
