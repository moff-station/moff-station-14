- type: entity
  id: LawConfigurator
  parent: [BaseItem, BaseScienceContraband]
  name: handheld cyborg configurator
  description: this handy device allow you to see and change the laws of a positronic brain by simple contact !
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Tools/handheld_reprogrammer.rsi
    state: empty
    layers:
    - state: empty
    - state: full
    shader: unshaded
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.LawReprogrammerVisuals.Status:
        base:
          Empty: { state: empty }
          Full: { state: full }
  - type: Item
    sprite: _Moffstation/Objects/Tools/handheld_reprogrammer.rsi
    state: icon
    storedRotation: -90
  - type: ItemSlots
    slots:
      law_board_slot:
        ejectOnBreak: true
        whitelistFailPopup: reprogrammer-insertion-failure-popup
        whitelist:
          tags:
          - LawBoard
  - type: LawConfigurator
    successSound: /Audio/Machines/twobeep.ogg
    failureSound: /Audio/Machines/twobeep.ogg
  - type: UseDelay
    delay: 4

