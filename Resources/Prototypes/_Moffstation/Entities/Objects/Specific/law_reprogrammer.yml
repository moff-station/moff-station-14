- type: entity
  id: LawReprogrammer
  parent: [BaseItem, BaseScienceContraband]
  name: handheld reprogrammer
  description: this handy device allow you to transfer the content of a law board to a positronic brain by simple contact !
  components:
  - type: Sprite # TODO : 2 appearances (or multiple depending on colors ?...)
    sprite: _Moffstation/Objects/Tools/handheld_reprogrammer.rsi
    state: empty
    layers:
    - state: empty
    - state: full
    shader: unshaded
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.LawReprogrammerVisuals.Status:
        base:
          Empty: { state: empty }
          Full: { state: full }
  - type: Item
    sprite: _Moffstation/Objects/Tools/handheld_reprogrammer.rsi
    state: icon
    storedRotation: -90
  - type: ItemSlots
    slots:
      law_board_slot:
        ejectOnBreak: true
        whitelistFailPopup: reprogrammer-insertion-failure-popup
        whitelist:
          tags:
          - LawBoard
  - type: LawReprogrammer
    successSound: /Audio/Machines/twobeep.ogg
    failureSound: /Audio/Machines/twobeep.ogg

