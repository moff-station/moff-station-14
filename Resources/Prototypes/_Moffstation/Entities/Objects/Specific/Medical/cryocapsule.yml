- type: entity
  parent: BaseItem
  id: Cryocapsule
  name: cryogenic capsule
  description: a cryogenic tube to store organs and keep them alive in the absence of a body.
  components:
  - type: Physics
    bodyType: KinematicController
  - type: BlockMovement
  - type: MindContainer
  - type: Examiner
  - type: Speech
    speechSounds: Pai
  - type: TypingIndicator
    proto: slime
  - type: FitInCryoLifeSupport
  - type: CryoCapsule
    canContain:
    - Brain
    - Eyes
    - Lungs
    - Heart
    - Stomach
  - type: Respirator # for now copied from Slime, find a way to not make it gasp lol
    damage:
      types:
        Asphyxiation: 0.2
    damageRecovery:
      types:
        Asphyxiation: -1.0
    maxSaturation: 15


  - type: Body
  - type: SolutionContainerManager # the cryoformol
  - type: Sprite
    sprite: _Moffstation/Objects/Specific/Medical/cryocapsule.rsi
    state: empty
    noRot: true
  - type: Appearance

  - type: ItemMapper
    mapLayers:
      brain:
        whitelist:
          components:
          - Brain
      eyes:
        whitelist:
          tags:
          - Eyes
      stomach:
        whitelist:
          components:
          - Stomach
      lungs:
        whitelist:
          components:
          - Lung
      heart:
        whitelist:
          tags:
          - Heart
  - type: Item
    size: Huge
  - type: Damageable
  - type: MobState
    allowedStates:
    - Alive
    - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      150: Dead
