- type: entity
  parent: BaseItem
  id: Cryocapsule
  name: cryogenic capsule
  description: a cryogenic tube to store organs and keep them alive in the absence of a body.
  components:
  - type: Cryocapsule
    brainSlot:
      name: cryocapsule-brain-slot-name
      whitelist:
        components:
        - Brain
    eyesSlot:
      name: cryocapsule-eyes-slot-name
      whitelist:
        tags:
        - Eyes
    lungsSlot:
      name: cryocapsule-lungs-slot-name
      whitelist:
        components:
        - Lung
    stomachSlot:
      name: cryocapsule-stomach-slot-name
      whitelist:
        components:
        - Stomach
    heartSlot:
      name: cryocapsule-heart-slot-name
      whitelist:
        tags:
        - Heart
  - type: ItemSlots
  - type: ContainerContainer
    containers:
      brain_slot: !type:ContainerSlot
      eyes_slot: !type:ContainerSlot
      lungs_slot: !type:ContainerSlot
      stomach_slot: !type:ContainerSlot
      heart_slot: !type:ContainerSlot
  - type: Sprite
    sprite: _Moffstation/Objects/Specific/Medical/cryocapsule.rsi
    state: empty
  - type: Appearance
  - type: ItemMapper
    mapLayers:
      brain:
        whitelist:
          components:
          - Brain
      eyes:
        whitelist:
          tags:
          - Eyes
      stomach:
        whitelist:
          components:
          - Stomach
      lungs:
        whitelist:
          components:
          - Lung
      heart:
        whitelist:
          tags:
          - Heart
  - type: Speech
    speechSounds: Pai
  - type: TypingIndicator
    proto: slime
  - type: Item
    size: Huge

