- type: entity
  id: MothroachMigration
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    earliestStart: 15
    weight: 6
    duration: 30 # Used as delay
  - type: VentCrittersRule
    entries:
    - id: RandomMothroachSpawner
      prob: 0.01

- type: entity
