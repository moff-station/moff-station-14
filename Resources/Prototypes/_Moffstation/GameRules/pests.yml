- type: entity
  id: CarpSpawnHorde
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    startAnnouncement: station-event-vent-creatures-start-horde-announcement
    startAudio:
      path: /Audio/Announcements/attention.ogg
    earliestStart: 20
    minimumPlayers: 15
    weight: 6
    duration: 5
    maxDuration: 20
  - type: VentHordeRule
    table: !type:GroupSelector
      rolls: 4, 8
      children:
      - !type:GroupSelector
        weight: 5
        children:
        - id: MobCarpSmasher
      - !type:GroupSelector
        weight: 1
        children:
        - id: MobCarpMagicSmasher
        - id: MobCarpHoloSmasher
        - id: MobSharkSmasher
      - !type:GroupSelector
        weight: 0.1
        children:
        - id: MobDragonDungeonSmasher

