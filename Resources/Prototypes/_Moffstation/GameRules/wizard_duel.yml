- type: entity
  abstract: true
  parent: BaseGameRule
  id: BaseWizardDuelRule
  components:
  - type: LoadMapRule
    mapPath: /Maps/_Moffstation/Nonstations/wizards-court.yml
  - type: RuleGrids
  - type: AntagSelection
  - type: AntagLoadProfileRule
  - type: DynamicRuleCost
    cost: 150

- type: entity
  parent: BaseWizardDuelRule
  id: WizardDuel
  components:
  - type: GameRule
    minPlayers: 1 # change back to 35 later
  - type: AntagSelection
    agentName: wizard-round-end-name
    selectionTime: PrePlayerSpawn
    definitions:



    - prefRoles: [ Wizard ] # Red Wizard Duelist
      min: 1
      max: 1
      spawnerPrototype: SpawnPointGhostWizardDuelistRed
      roleLoadout:
      #- RoleSurvivalExtended
      - JobWizardDuelist
      briefing:
        text: wizard-duelist-red-role-greeting
        color: Turquoise
      startingGear: WizardDuelistRedGear
      components:
      - type: NpcFactionMember
        factions:
        - Wizard
      - type: RandomMetadata
        nameSegments:
        - NamesWizardFirst
        - NamesWizardLast
        nameFormat: name-format-wizard
      mindRoles:
      - MindRoleWizardDuelistRed

    - prefRoles: [ Wizard ] # blue Wizard Duelist
      min: 1
      max: 1
      spawnerPrototype: SpawnPointGhostWizardDuelistBlue
      roleLoadout:
      #- RoleSurvivalExtended
      - JobWizardDuelist
      briefing:
        text: wizard-duelist-blue-role-greeting
        color: Turquoise
      startingGear: WizardDuelistBlueGear
      components:
      - type: NpcFactionMember
        factions:
        - Wizard
      - type: RandomMetadata
        nameSegments:
        - NamesWizardFirst
        - NamesWizardLast
        nameFormat: name-format-wizard
      mindRoles:
      - MindRoleWizardDuelistBlue

    - prefRoles: [ Wizard ] # violet Wizard Duelist
      min: 1
      max: 1
      spawnerPrototype: SpawnPointGhostWizardDuelistViolet
      roleLoadout:
      #- RoleSurvivalExtended
      - JobWizardDuelist
      briefing:
        text: wizard-duelist-violet-role-greeting
        color: Turquoise
      startingGear: WizardDuelistVioletGear
      components:
      - type: NpcFactionMember
        factions:
        - Wizard
      - type: RandomMetadata
        nameSegments:
        - NamesWizardFirst
        - NamesWizardLast
        nameFormat: name-format-wizard
      mindRoles:
      - MindRoleWizardDuelistViolet


  - type: DynamicRuleCost
    cost: 150
