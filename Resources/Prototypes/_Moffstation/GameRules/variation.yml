    weight: 5
    reagents:
    - Vomit
    - InsectBlood
    - WeldingFuel
    - Mold
  - quantity: 500
    weight: 4
    reagents:
    - PlantBGone
    - VentCrud
    - Carbon
    - Hydrogen
    - Fat
    - SpaceGlue
    - Sulfur
    - Acetone
    - Bleach
  - quantity: 30
    weight: 3
    reagents:
    - Blood
    - CopperBlood
    - Slime
    - ShimmeringBlood

- type: entity
  parent: BaseVariationPass
  id: MoffDamagedHullVariationPass
  components:
  - type: MoffAnnounceOnRuleStarted
    message: damaged-hull-variation-briefing
    color: salmon
    serverAnnouncement: true
  - type: EntitySpawnVariationPass
    tilesPerEntityAverage: 400
    tilesPerEntityStdDev: 10
    entities:
    - id: MoffC4InstantExplosion

- type: entity
  parent: C4
  id: MoffC4InstantExplosion
  name: C-4 Explosion
  suffix: Instant Explosion
  description: UH OH WE ARE EXPLODING
  components:
  - type: TriggerOnSpawn
  - type: TimerTrigger
    keysIn:
    - trigger
    - stuck
    delay: 0.01
    delayOptions: [ 0.01 ]
    beepSound: null
