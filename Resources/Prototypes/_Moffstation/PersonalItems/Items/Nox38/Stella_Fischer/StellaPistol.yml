# Player: Nox38 - Character: Stella Fischer
- type: entity
  parent: BaseWeaponPersonalItemPistol
  id: PersonalItemStellaPistol
  name: Mk9 custom
  description: "A limited-production Mk9 NIGHTHAWK pistol, customized with a red dot sight, compensator, and laser pointer. Despite not appearing damaged, the grip is wrapped in blue tape.\nFeeds from .35 pistol magazines." # Description references real-life weapon's name: PX-9 NIGHTSTALKER.
  suffix: PersonalItem
  components:
  - type: Sprite
    sprite: _Moffstation/PersonalItems/Items/Nox38/Stella-Fischer/stella-pistol.rsi
  - type: Clothing
    sprite: _Moffstation/PersonalItems/Items/Nox38/Stella-Fischer/stella-pistol.rsi
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/atreides.ogg

- type: entity
  parent: BriefcaseWeaponSmall
  id: &case_id "PersonalItemStellaPistolCase"
  name: Mk9 gun case
  description: A slim, portable gun case intended to protect its contents. The outside is wrapped in blue tape.
  suffix: PersonalItem
  components:
  - type: Sprite
    sprite: &case "_Moffstation/PersonalItems/Items/Kento/Does-A-Little-Shimmy/shimmypistolcase.rsi"
  - type: Item
    sprite: *case
  - type: EntityTableContainerFill
    containers:
      storagebase:
        id: PersonalItemStellaPistol
        amount: 1

- type: loadout
  id: *case_id
  storage:
    back:
    - *case_id
  effects:
  - !type:PersonalItemLoadoutEffect
    character:
    - Stella Fischer
    jobs:
    - JobSecurityOfficer
    - JobDetective
    - JobWarden
    - JobHeadOfSecurity
