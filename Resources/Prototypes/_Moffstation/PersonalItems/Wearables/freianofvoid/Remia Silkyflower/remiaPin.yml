# Player: FreianOfVoid
# Character: Remia Silkyflower

- type: entity
  parent: ClothingNeckMetallicBase
  id: &id PersonalItemRemiaPinSwappable
  name: Remia's NTPO badges
  description: "A pair of badges given to Remia Silkyflower by her previous job. The first badge depicts the old Nanotrasen Planetary Outpost logo, with a red dwarf star in the background.\nThe second is a 'Language Learner' badge, identifying the wearer as one who is still learning common. It depicts a purple sunrise with the letters 'LL' stitched into it, with the silhouette of a moth at the bottom.\nIt can be toggled using an air tank."
  suffix: swappable
  components:
  - type: Sprite
    sprite: &sprite _Moffstation/PersonalItems/Wearables/freianofvoid/Remia_Silkyflower/remiaPin.rsi
  - type: Item
    sprite: *sprite
  - type: Construction
    deconstructionTarget: null
    graph: &graph PersonalItemRemiaPinSwapGraph
    node: &remia swap_remia

- type: entity
  parent: ClothingNeckMetallicBase
  id: &id-inverse PersonalItemRemiaPinInversedSwappable
  name: Loraine's camera badge?
  description: "A strange badge worn by Loraine Silkfire. It depicts what could be either a camera or a gemstone against a background of black and red.\nIt can be toggled using an air tank."
  suffix: swappable
  components:
  - type: Sprite
    sprite: &sprite-inverse _Moffstation/PersonalItems/Wearables/freianofvoid/Remia_Silkyflower/remiaPinInversed.rsi
  - type: Item
    sprite: *sprite-inverse
  - type: DetailExaminable
    content: "Emblazoned on the back of the badge is the unmistakable red S of the Syndicate."
  - type: Construction
    deconstructionTarget: null
    graph: *graph
    node: &loraine swap_loraine

- type: constructionGraph
  id: *graph
  start: *loraine
  graph:
  - node: *loraine
    entity: *id-inverse
    edges:
    - to: *remia
      steps:
      - tool: Rolling
        doAfter: 0.1
  - node: *remia
    entity: *id
    edges:
    - to: *loraine
      steps:
      - tool: Rolling
        doAfter: 0.1

- type: loadout
  id: PersonalItemRemiaPin
  storage:
    back:
    - *id
  effects:
  - !type:PersonalItemLoadoutEffect
    character:
    - Remia Silkyflower

