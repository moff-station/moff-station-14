- type: entity
  parent: CrateGenericSteel
  id: CrateCompoundBow
  name: compound bow crate
  description: Contains one Compound Bow with a quiver full of carp teeth arrows for use by salvage.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: BowCompound
          amount: 1
        - id: ClothingBeltQuiverCarpFill
          amount: 1

- type: entity
  parent: CrateGenericSteel
  id: CratePlasmaArrow
  name: plasma arrow crate
  description: Contains a quiver full of plasma shard arrows for use by salvage.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage:
        id: ClothingBeltQuiverPlasmaFill
