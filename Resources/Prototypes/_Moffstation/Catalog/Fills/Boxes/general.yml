- type: entity
  parent: BoxCardboard
  id: BoxSurvivalEmpty
  name: survival box
  description: A cardboard box for storing emergency supplies.
  components:
  - type: Item
    size: Normal
    shape:
    - 0,0,1,1
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,2,2
    whitelist:
      tags:
      - SurvivalBoxInsertable

- type: entity
  parent: BoxSurvivalEmpty
  id: BoxHugEmpty
  name: box of hugs
  description: A special box for sensitive people.
  suffix: Empty
  components:
  - type: Sprite
    layers:
    - state: box_hug
    - state: heart
  - type: Item
    heldPrefix: hug
  - type: Tag
    tags:
    - BoxCardboard
    - BoxHug

