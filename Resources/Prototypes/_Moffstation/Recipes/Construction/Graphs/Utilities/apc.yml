- node: apcFrameWithBoard
  entity: APCFrameWithBoard
  edges:
  - to: apcPotato
    steps:
    - anyTags:
      - PotatoBattery
      store: powercell
      name: construction-graph-tag-power-cell
      icon:
        sprite: "Objects/Power/power_cells.rsi"
        state: "small"
      doAfter: 0.5
    - tool: Screwing
      doAfter: 2
  - to: apcSmall
    steps:
    - anyTags:
      - PowerCellSmall
      store: powercell
      name: construction-graph-tag-power-cell
      icon:
        sprite: "Objects/Power/power_cells.rsi"
        state: "small"
      doAfter: 0.5
    - tool: Screwing
      doAfter: 2
  - to: apc
    steps:
    - anyTags:
      - PowerCellMedium
      store: powercell
      name: construction-graph-tag-power-cell
      icon:
        sprite: "Objects/Power/power_cells.rsi"
        state: "medium"
      doAfter: 0.5
    - tool: Screwing
      doAfter: 2
  - to: apcHigh
    steps:
    - anyTags:
      - PowerCellHigh
      store: powercell
      name: construction-graph-tag-power-cell
      icon:
        sprite: "Objects/Power/power_cells.rsi"
        state: "medium"
      doAfter: 0.5
    - tool: Screwing
      doAfter: 2
  - to: apcHyper
    steps:
    - anyTags:
      - PowerCellHyper
      store: powercell
      name: construction-graph-tag-power-cell
      icon:
        sprite: "Objects/Power/power_cells.rsi"
        state: "medium"
      doAfter: 0.5
    - tool: Screwing
      doAfter: 2
  - to: apcFrame
    completed:
    - !type:GivePrototype
      prototype: APCElectronics
      amount: 1
    conditions:
    - !type:WirePanel
      open: true
    steps:
    - tool: Prying
      doAfter: 4

