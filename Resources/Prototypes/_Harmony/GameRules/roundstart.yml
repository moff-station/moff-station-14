- type: entity
  parent: BaseGameRule
  id: Conspirators
  components:
  - type: GameRule
    minPlayers: 20 # Moff - Midpop Gamemode
    # Moffstation - Start - Delay so they don't get selected on arrivals
    delay:
      min: 240
      max: 300
    # Moffstation - End
  - type: ConspiratorRule
  - type: AntagSelection
    selectionTime: PrePlayerSpawn
    antags:
    - !type:LinearAntagCount
      proto: Conspirator
      range:
        min: 4
        max: 7
        playerRatio: 7

- type: antagSpecifier
  parent: RestrictedAntag
  id: Conspirator
  prefRoles: [ Conspirator ]
  blacklist:
    components:
    - AntagImmune
  briefing:
    text: conspirator-role-greeting
    color: "#724F29"
    sound: /Audio/_Harmony/Misc/conspirator_greeting.ogg
  components:
  - type: Conspirator
  - type: AutoImplant
    implants:
    - RadioImplantConspiracy
  doNotCheckComponents:
  - AutoImplant
  mindRoles:
  - MindRoleConspirator
