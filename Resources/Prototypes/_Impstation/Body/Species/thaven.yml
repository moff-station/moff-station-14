- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceThaven
  name: thaven appearance
  components:
  - type: Inventory
    speciesId: thaven
    templateId: thaven
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Thaven/displacement.rsi
            state: jumpsuit
      head:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Thaven/displacement.rsi
            state: head
      outerClothing:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Thaven/displacement.rsi
            state: outerclothing_hardsuit
      gloves:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Thaven/displacement.rsi
            state: hands
  - type: InitialBody
    organs:
      Torso: OrganThavenTorso
      Head: OrganThavenHead
      ArmLeft: OrganThavenArmLeft
      ArmRight: OrganThavenArmRight
      HandRight: OrganThavenHandRight
      HandLeft: OrganThavenHandLeft
      LegLeft: OrganThavenLegLeft
      LegRight: OrganThavenLegRight
      FootLeft: OrganThavenFootLeft
      FootRight: OrganThavenFootRight
      Brain: OrganThavenBrain
      Eyes: OrganThavenEyes
      Tongue: OrganHumanTongue # TODO
      Appendix: OrganHumanAppendix # TODO
      Ears: OrganHumanEars # TODO
      Lungs: OrganThavenLungs
      Heart: OrganThavenHeart
      Stomach: OrganThavenStomach
      Liver: OrganThavenLiver
      Kidneys: OrganThavenKidneys
  - type: HumanoidProfile
    species: Thaven

- type: entity
  parent:
  - AppearanceThaven
  - BaseSpeciesMobOrganic
  id: MobThaven
  name: Urist McEars
  components:
  - type: UserInterface
    interfaces:
      enum.HumanoidMarkingModifierKey.Key:
        type: HumanoidMarkingModifierBoundUserInterface
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
  - type: Speech
    speechSounds: Alto
  #- type: Vocal # TODO FIX this + speech indicator
    #sounds:
      #Male: MaleThaven
      #Female: FemaleThaven
      #Unsexed: UnisexThaven
  - type: Damageable
    damageModifierSet: Thaven
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#ff624a"
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: ShimmeringBlood
        Quantity: 300
  - type: MeleeWeapon
    attackRate: 0.55
    soundHit:
      collection: Punch
    angle: 30
    animation: WeaponArcPunch
    damage:
      types:
        Blunt: 0
  - type: StaminaDamageOnHit
    damage: 18
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodThavenMeat
      amount: 5
  - type: StrangeMoods
    mood: ThavenMoods
  - type: IonStormTarget

- type: entity
  parent: OrganBase
  id: OrganThaven
  abstract: true
