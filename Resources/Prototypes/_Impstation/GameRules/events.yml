# eeeplet
- type: entity
  id: EeepSpawn
  parent: BaseGameRule
  components:
  - type: StationEvent
    weight: 3.5
    earliestStart: 25
    reoccurrenceDelay: 40
    minimumPlayers: 30
    duration: null
  - type: SpaceSpawnRule
    spawnDistance: 0
  - type: AntagSpawner
    prototype: MobEeeplet
  - type: AntagSelection
    selectionTime: Enroll
    agentName: ghost-role-information-eeep-name
    antags:
    - !type:FixedAntagCount
      proto: Eeplet
  - type: ESSynchronizedVoteManager
    votes:
    - EepEnroller

- type: antagSpecifier
  parent: RestrictedAntag
  id: Eeplet
  spawnerPrototype: SpawnPointGhostEeeplet
  pickPlayer: false
  mindRoles:
  - MindRoleEep

- type: entity
  id: TouristSpawn #three tourists
  parent: BaseGameRule
  components:
  - type: StationEvent
    weight: 2
    duration: null
    minimumPlayers: 25
    maxOccurrences: 1
  - type: RuleGrids
  - type: AntagRandomObjectives
    sets:
    - groups: TouristObjectiveGroups
    maxDifficulty: 5
  - type: LoadMapRule
    gridPath: /Maps/_Moffstation/Shuttles/tourists.yml
  - type: AntagSelection
    selectionTime: Enroll
    agentName: tourist-round-end-agent-name
    antags:
    - !type:FixedAntagCount
      count: 3
      proto: Tourist
  - type: ESSynchronizedVoteManager
    votes:
    - TouristEnroller
