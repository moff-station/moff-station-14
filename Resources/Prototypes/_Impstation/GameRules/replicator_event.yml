# these are HEAVILY based on the Bingle free-agent ghostrole from GoobStation, but reflavored and reprogrammed to make them more Robust (and less of a meme.)
# all credit for the core gameplay concepts and a lot of the core functionality of the code goes to the folks over at Goob, but I re-wrote enough of it to justify putting it in our filestructure.
# the original Bingle PR can be found here: https://github.com/Goob-Station/Goob-Station/pull/1519
- type: entity
  id: ReplicatorSpawn
  parent: BaseGameRule
  components:
  - type: StationEvent
    earliestStart: 20
    weight: 5.5
    duration: null
    minimumPlayers: 30
    maxOccurrences: 1
  - type: AntagRandomSpawn
  - type: AntagSpawner
    prototype: MobReplicatorT0Queen
  - type: ReplicatorRule
  - type: AntagSelection
    selectionTime: Enroll # Moff - Enrolling
    agentName: ghost-role-information-replicator-name
    antags:
    - !type:FixedAntagCount
      proto: ReplicatorQueen
  - type: ESSynchronizedVoteManager
    votes:
    - ReplicatorEnroller

- type: antagSpecifier
  parent: RestrictedAntag
  id: ReplicatorQueen
  spawnerPrototype: SpawnPointGhostReplicatorQueenAntag
  pickPlayer: false
  allowNonHumans: true
  mindRoles:
  - MindRoleReplicator
