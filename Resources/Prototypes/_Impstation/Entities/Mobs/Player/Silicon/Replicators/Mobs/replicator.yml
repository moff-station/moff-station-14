# these are HEAVILY based on the Bingle free-agent ghostrole from GoobStation, but reflavored and reprogrammed to make them more Robust (and less of a meme.)
# all credit for the core gameplay concepts and a lot of the core functionality of the code goes to the folks over at Goob, but I re-wrote enough of it to justify putting it in our filestructure.
# the original Bingle PR can be found here: https://github.com/Goob-Station/Goob-Station/pull/1519
- type: entity
  parent: MobSiliconBase
  id: BaseMobReplicator
  abstract: true
  name: replicator
  description: It's just a little guy. What harm could it do?
  components:
  - type: Replicator
    upgradeReadyPopup: replicator-upgrade-ready
    upgradedPopupOther: replicator-upgraded-other
    upgradeSound: /Audio/_Impstation/Misc/replicator_sfx2.ogg
    nestDestroyedPopup: replicator-nest-destroyed-popup
    queenKilledPopup: replicator-queen-killed-popup
    upgradeToOnNestDestruction: MobReplicatorTier1
  - type: Body
  - type: Puller
    needsHands: false
    applyHeldSpeedModifier: false
  - type: ZombieImmune
  - type: EmpVulnerable
    empStunDuration: 5s
    ionStunDuration: 0.1s
  - type: NameIdentifier
    group: Replicator
  - type: SiliconLawBound
  - type: SiliconLawProvider
    laws: Replicator
  - type: GhostTakeoverAvailable
  - type: GhostRole
    name: ghost-role-information-replicator-name
    description: ghost-role-information-replicator-desc
    rules: ghost-role-information-replicator-rules
    mindRoles:
    - MindRoleGhostRoleTeamAntagonist
    raffle:
      settings: short
  - type: Sprite
    granularLayersRendering: true
    drawdepth: Mobs
    sprite: _Impstation/Mobs/Replicator/replicator.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: alive
    - map: ["enum.ReplicatorVisuals.Combat"]
      state: combat_level1
      shader: unshaded
      visible: false
  - type: UserInterface
    interfaces:
      enum.SiliconLawsUiKey.Key:
        type: SiliconLawBoundUserInterface
  - type: Appearance
  - type: ActionGrant
    actions:
    - ActionViewLaws
  - type: TypingIndicator
    proto: replicator
  - type: Speech
    speechVerb: Robotic
    speechSounds: Replicator
    allowedEmotes:
    - Laugh
  - type: Vocal
    sounds:
      Unsexed: UnisexSiliconXenoborg
    wilhelmProbability: 0
  - type: UnblockableSpeech
  - type: DamagedSiliconAccent
  #  - type: Monotonous
  #  - type: NoContractionsAccent
  #  - type: ProperPunctuation
  #  - type: ProperCapitalization
  - type: ReplacementAccent
    accent: silicon
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Binary
  - type: ActiveRadio
    channels:
    - Binary
  - type: Actions
  - type: ProtectedFromStepTriggers
  - type: InputMover
  - type: MobMover
  - type: ContentEye
    maxZoom: 1.2, 1.2
  - type: Tag
    tags:
    - CannotSuicide
    - EmagImmune
    - DoorBumpOpener
    - CanPilot
    - VimPilot
    - SiliconEmotes
  - type: MobState
    allowedStates:
    - Alive
    - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Dead
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTypeTrigger
        damageType: Blunt
        damage: 150
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetPlasteel1:
            min: 1
            max: 5
  - type: StatusEffects
    allowed:
    - Stun
    - KnockedDown
    - SlowedDown
    - Flashed
    - TemporaryBlindness
    - StaminaModifier
  - type: DamageStateVisuals
    states:
      Alive:
        Base: alive
      Dead:
        Base: dead
  - type: MeleeWeapon
    soundHit:
      path: "/Audio/Items/wirecutter.ogg"
    angle: 0
    wideAnimationRotation: 0
    animation: WeaponArcSlash
    damage:
      types:
        Slash: 7
  - type: MovementSpeedModifier
    baseWalkSpeed: 2 # same as slime
    baseSprintSpeed: 4
  - type: Stamina
    baseCritThreshold: 120
  - type: Damageable
    damageModifierSet: Replicator1
  - type: Injurable
    damageContainer: StructuralInorganic
  - type: PassiveDamage # passive healing
    allowedStates:
    - Alive
    damage:
      types:
        Piercing: -0.5
        Blunt: -0.5
        Slash: -0.5
        Cold: -0.5
        Heat: -0.5
        Caustic: -0.5
        Shock: -0.5
        Structural: -0.5
  #  - type: ThermalVision
  #    lightRadius: 7
  #    color: "#d70aa0"
  - type: Prying
    pryPowered: true
    force: true
    speedModifier: 1
    useSound:
      path: /Audio/Items/crowbar.ogg
  - type: NpcFactionMember
    factions:
    - Replicator
  - type: Inventory
    templateId: replicator
  - type: InventorySlots
  - type: BlockMachineUI
  - type: NoSlip
  - type: MovementAlwaysTouching
  - type: Physics
    bodyStatus: InAir
  - type: CanMoveInAir
  - type: MovementIgnoreGravity
  - type: SyncSprite
  - type: ComplexInteraction
